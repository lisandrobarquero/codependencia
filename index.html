{
"dia": "Lunes",
"aspecto": "La ilusión del control",
"ensenanza": "Muchos llegamos al Primer Paso convencidos de que el problema está en el otro. Creemos que controlar es nuestra responsabilidad, nuestra obligación, incluso nuestra manera de amar. Melody Beattie lo describe con claridad: creía estar en completo control de sí misma y de los demás, que no existía circunstancia que no pudiera manejar mediante pura fuerza de voluntad. Controlar no era un defecto — era lo que se esperaba de ella. Era la única manera de sobrevivir.\n\nEl problema es que el control sobre la vida de otro es una ilusión. No existe. Por más que lo intentemos, no podemos hacer que otro cambie, sienta, decida o crezca. Y mientras gastamos nuestra energía intentando lo imposible, nuestra propia vida — nuestros sentimientos, nuestras necesidades, nuestros sueños — queda abandonada.\n\nEl Primer Paso no nos pide que nos rindamos ante la vida. Nos pide que nos rindamos ante la ilusión.",
"historia": "Había alguien a quien Melody amaba que bebía mucho. Ella había hecho todo lo posible para lograr que dejara de beber. Nada funcionaba.\n\nEntonces dio con el plan perfecto: le demostraría cómo se sentía amar a alguien que usaba sustancias. Con cuidado montó la escena — un paquetito de azúcar glass, una cuchara quemada, una bolita de algodón — y se acostó en el sofá para que pareciera que estaba bajo los efectos de un narcótico.\n\nCuando el alcohólico entró al cuarto, Melody saltó del sofá y comenzó a sermonear: \"¡Ya ves! ¡Ves cómo se siente amar a alguien y verlo usar drogas!\"\n\nEsa noche, una vecina le dijo algo que tardó meses en entender: \"Lo que estás haciendo es verdaderamente una locura. Necesitás ir a Al-Anon.\"\n\nMelody no necesitaba demostrarle al alcohólico cuánto dolor padecía. Necesitaba tomar conciencia de cuánto dolor padecía ella. Necesitaba comenzar a cuidarse a sí misma.",

"preguntas": [

"Proverbios 16:9 dice que el Señor dirige los pasos — no nosotros los de otro. ¿Qué área de la vida de otra persona estás intentando dirigir que le corresponde a Dios? ¿Qué pasaría si te retiraras de ese lugar?",

{
"dia": "Martes",
"aspecto": "Las formas de la ingobernabilidad",
"ensenanza": "Cuando el Primer Paso habla de ingobernabilidad, no habla únicamente de caos visible. La ingobernabilidad puede ser externa — relaciones rotas, finanzas destruidas, salud deteriorada — pero también puede ser interna: pensamientos obsesivos, emociones que no podemos manejar, una corriente constante de miedo, resentimiento o vacío.\n\nBeattie identifica algo poderoso: mientras estamos enfocados en la vida del otro, no podemos ver la ingobernabilidad en la nuestra. Era buena para ver los comportamientos de otro. Sin embargo, no podía ver el caos en su propia vida — las deudas, la salud quebrada, las relaciones tensas, la espiritualidad en bancarrota — todo esto a los treinta y dos años.\n\nLa ingobernabilidad entra cuando dejamos de ejercer nuestro verdadero poder: pensar, sentir, tomar decisiones y vivir nuestra propia vida. En el momento en que intentamos ejercer poder donde no lo tenemos, sacrificamos el poder que sí tenemos.",
"historia": "Stanley era un arquitecto exitoso de unos cincuenta años. Tardó dieciséis años en reconocer el caos en su vida.\n\nSu hijo John causaba problemas desde los seis años. Stanley pasó dos décadas negociando con escuelas, policías y terapeutas. Gastó veinte mil dólares en terapia. Vendió su casa y cambió de ciudad para que John pudiera graduarse. Su esposa lo abandonó. Sus otros hijos también se fueron. Hubo noches en que Stanley terminó en urgencias con cuarenta y cinco puntos en la cabeza.\n\nUn día, un muchacho de dieciséis años tenía el control total de la casa.\n\n\"Estaba agotado, y me sentía totalmente carente de autoestima, de valor como ser humano\", dijo.\n\nStanley comenzó a asistir a juntas de Al-Anon. Lo que siguió fue una transformación: bajó más de cincuenta kilos, recuperó su paz, reconstruyó su relación con su hijo. No porque controlara el resultado — sino porque dejó de intentarlo.",
"pasajePrincipal": {

"conexion": "Romanos 7 y Salmo 32 describen juntos lo que es vivir en ingobernabilidad: por dentro, un ciclo que no podemos romper solos; en el cuerpo, el peso físico de lo no resuelto. David habla de huesos que envejecen, de verdor que se convierte en sequía — imágenes de lo que le pasa al cuerpo cuando el alma carga lo que no puede. Stanley lo vivió en carne propia. La ingobernabilidad no es solo un concepto espiritual — es algo que el cuerpo registra.",

"Stanley gastó dieciséis años y veinte mil dólares y no alcanzó. ¿Cuánto tiempo, energía, dinero o salud has invertido intentando manejar la vida de alguien más? ¿Qué ha costado eso en tu propia vida?"

{

"ensenanza": "La codependencia no nace en la adultez. Nace mucho antes, en hogares donde aprendimos que suprimir nuestros sentimientos era la única manera de sobrevivir. Donde aprendimos que el amor se ganaba siendo perfectos, siendo útiles, siendo invisibles. Donde aprendimos — a veces sin que nadie lo dijera en palabras — que éramos responsables de los sentimientos de otros.\n\nBeattie lo describe así: no éramos defectuosos. Sencillamente repetíamos lo que aprendimos, a veces a muy temprana edad — protegiéndonos mediante el intento de controlar a otros, o permitiendo que otros nos controlaran. Nos convertimos en adultos cuidadores y controladores que perdieron contacto con una meta real: amarse y aceptarse a sí mismos.\n\nLo que funciona para sobrevivir en la infancia no funciona para vivir en la adultez. Pero el problema es que esos patrones se sienten tan naturales, tan automáticos, que ni los vemos. Creemos que así somos. No es así: así aprendimos.",
"historia": "Jackie creció escuchando que ella hacía sufrir a su madre. Desde los tres años le inculcaron esa idea. Llegó a la adultez convencida de que tenía el poder de hacer sufrir a las personas, hacerlas felices, hacerlas sentir.\n\n\"Era una responsabilidad tremenda y muy equivocada. Me ponía de cabeza tratando de controlar cómo se sentían los demás. Llegué a odiar estar cerca de las personas porque ser responsable de su manera de sentir era una tarea terriblemente pesada.\"\n\nMarcia aprendió algo aún más extremo: que tenía poder sobre la vida o la muerte de su madre. En la secundaria, su madre intentaba suicidarse periódicamente. Marcia corría de la escuela, apagaba el horno, ventilaba la casa, acostaba a su madre. Luego volvía a clases.\n\n\"A muy temprana edad aprendí que tenía un enorme poder sobre la vida de otros.\"\n\nNinguna de las dos eligió creer eso. Se lo enseñaron. Y como adultas, lo siguieron practicando en todas sus relaciones.",

"preguntas": [

{
"dia": "Jueves",
"aspecto": "El miedo como corriente subterránea",
"ensenanza": "Debajo de todos los comportamientos codependientes — el control, el rescate, el exceso de cuidado, la obsesión — hay una corriente subterránea que los alimenta: el miedo. Miedo al abandono, al rechazo, a la soledad, a no ser suficiente, a que todo se derrumbe si dejamos de controlar.\n\nEl problema es que muchos no lo identificamos como miedo. Lo sentimos como enojo, como hiperresponsabilidad, como urgencia de solucionar, como incapacidad de relajarnos. Beattie lo describe así: el miedo domina la mayor parte de nuestras acciones aunque no lo veamos ni lo sintamos en el momento. Lo que hacemos es fijarnos en los demás — sobre-cuidarlos, controlarlos, pensar obsesivamente en ellos. Lo que no hacemos es cuidar de nosotros mismos de una manera amorosa.\n\nEl miedo crea una energía específica que otros perciben — aunque solo estemos pensando en ello sin actuar. Y esa energía genera exactamente lo que más tememos.",
"historia": "Brad creció con un padre alcohólico. Pasó la mayor parte de su vida solo, desconectado de las personas, exigiéndose demasiado, sin poder mantener una relación.\n\n\"Creo que la mayor parte de mi vida he estado enojado. El coraje era la fuente de mi energía vital. No me enojaba — era como una corriente subterránea que gobernaba mi vida.\"\n\nJane, después de un año en CoDA, llegó a una comprensión que la sacudió:\n\n\"Llegué a comprender qué tan aterrada he estado toda mi vida. Durante todos estos años he vivido a través del miedo.\"\n\nNi Brad ni Jane sabían que lo que sentían era miedo. Brad lo llamaba coraje. Jane simplemente funcionaba desde él sin nombrarlo. El Primer Paso les dio el lenguaje para ver lo que siempre había estado ahí.",
"pasajePrincipal": {

},
"contextoBiblico": "Juan escribe esta carta a comunidades cristianas que enfrentaban persecución y falsas enseñanzas. En los capítulos 4 y 5 desarrolla la relación entre el amor de Dios y la vida del creyente. El versículo 18 llega después de afirmar que \"Dios es amor\" — y de ahí concluye: si Dios es amor perfecto y ese amor habita en nosotros, el miedo no puede reinar. Juan añade algo poderoso: el miedo \"lleva en sí castigo.\" Quien vive desde el miedo ya está siendo castigado por él, sin necesidad de que nada externo lo lastime.",
"pasajeApoyo": {

"conexion": "El espíritu que nos llevó a controlar, a rescatar, a obsesionarnos — ese espíritu de cobardía, de miedo — no viene de Dios. Lo que Dios da es radicalmente distinto: poder (nuestro propio poder legítimo, no el de otros), amor (no el amor compulsivo del cuidador que se pierde a sí mismo) y dominio propio (claridad, no obsesión). 1 Juan 4:18 aclara además que el miedo ya nos está castigando. La libertad no comienza cuando el otro cambia. Comienza cuando el amor de Dios empieza a desplazar el miedo.",
"preguntas": [

"2 Timoteo 1:7 distingue entre el espíritu de cobardía y el espíritu de poder, amor y dominio propio. ¿Desde cuál de los dos estás operando en tu relación más conflictiva? ¿Cómo se vería operar desde el poder y el dominio propio en lugar del miedo?",
"Brad expresó su miedo como coraje durante décadas sin reconocerlo. ¿Cómo se disfraza tu miedo — como enojo, como hiperactividad, como exceso de cuidado, como pensamiento obsesivo? ¿Podés ponerle el nombre correcto hoy?"

"practica": "Sentate en silencio cinco minutos hoy. Preguntate: \"¿De qué tengo miedo realmente?\" No respondas con lo que pensás — respondé con lo que sentís en el cuerpo. Escribí ese miedo sin intentar resolverlo. Solo nombrarlo ya es un acto de honestidad."

{
"dia": "Viernes",
"aspecto": "Aceptar la impotencia: rendirse no es derrota",

"historia": "Karen llevaba quince años sobria. Asistía a cinco reuniones por semana, ayudaba constantemente a otros — los necesitaran o no. Pero por dentro estaba tan avergonzada de sí misma como el día en que dejó las drogas. No podía decir que no. Todo lo que hacía lo hacía para que otros la quisieran.\n\n\"Me sentía tan mal acerca de mí misma. Tenía la esperanza de que si ayudaba a suficientes personas, Dios comenzaría a tratarme bien.\"\n\nFue entonces cuando llegó a una comprensión que lo cambió todo:\n\n\"Dios no me obligaba a hacer todas esas cosas. Dios no evitaba que el bien llegara a mi vida. Yo lo hacía. Sabía que necesitaba, quería y me merecía más de mi recuperación. Ya era hora.\"\n\nKaren no necesitaba que Dios cambiara a los demás. Necesitaba dejar de bloquearse a sí misma.",
"pasajePrincipal": {
"ref": "2 Corintios 12:9-10",
"texto": "\"Y me ha dicho: Bástate mi gracia; porque mi poder se perfecciona en la debilidad. Por tanto, de buena gana me gloriaré más bien en mis debilidades, para que repose sobre mí el poder de Cristo. Porque cuando soy débil, entonces soy fuerte.\""
},
"contextoBiblico": "Pablo escribe a la comunidad de Corinto desde una posición vulnerable — está siendo cuestionado como apóstol. En los versículos anteriores describe un \"aguijón en la carne\", algo doloroso que le pidió a Dios tres veces que le quitara. La respuesta de Dios no fue la sanación sino la suficiencia: mi gracia te basta. No te voy a quitar el problema, pero te voy a dar todo lo que necesitás para vivir en él. Pablo descubre algo paradójico: es en la aceptación de su limitación — no en la lucha contra ella — donde el poder de Cristo descansa sobre él.",
"pasajeApoyo": {

"conexion": "Pablo le pidió tres veces a Dios que removiera su aguijón. Nosotros le hemos pedido innumerables veces que cambie a la persona que amamos. La respuesta puede ser la misma: bástate mi gracia. No porque Dios sea indiferente al sufrimiento, sino porque hay algo que solo puede ocurrir cuando dejamos de luchar para controlarlo todo: el poder de Dios descansa sobre nosotros. Karen lo descubrió cuando paró: no era Dios quien bloqueaba su recuperación. Era ella misma.",
"preguntas": [

"\"Cuando soy débil, entonces soy fuerte\" — Pablo encontró el poder de Cristo en la aceptación de su impotencia. ¿Podés nombrar un área donde tu debilidad y tu falta de control podrían ser precisamente el lugar donde Dios quiere actuar?",
"Karen se dio cuenta de que era ella quien bloqueaba el bien en su vida. ¿De qué maneras concretas tus comportamientos de control o de exceso de cuidado te han bloqueado a vos — tu paz, tu alegría, tu propio crecimiento?"

"practica": "Escribí una oración corta de rendición. No le pidás a Dios que cambie a la otra persona — solo reconocé tu impotencia y pedile gracia para vos. No tiene que ser larga ni perfecta. Una oración honesta es suficiente."

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const SEMANAS = JSON.parse(document.getElementById("app-data").textContent);
const TOTAL = 72;
const COOKIE = "guia_biblica_v3";

function getCookie() {
  try {
    const m = document.cookie.split("; ").find(r => r.startsWith(COOKIE + "="));
    return m ? JSON.parse(decodeURIComponent(m.split("=")[1])) : {};
  } catch { return {}; }
}
function saveCookie(data) {
  const exp = new Date(); exp.setFullYear(exp.getFullYear() + 2);
  document.cookie = `${COOKIE}=${encodeURIComponent(JSON.stringify(data))}; expires=${exp.toUTCString()}; path=/`;
}

// ─── PLACEHOLDER DAY ─────────────────────────────────────────────────────────
function PlaceholderDay({ d, i, sem, done, toggle, expanded, setExpanded }) {
  const k = `${sem.numero}-${i}`;
  const isDone = !!done[k];
  const isExp = expanded === i;
  return (
    <div className="day-card" style={{background:isDone?`${sem.color}0e`:"#13161f",border:`1px solid ${isDone?sem.color+"40":"#1e2130"}`,borderRadius:10,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:i)}>
        <div className="check-circle" onClick={e=>{e.stopPropagation();toggle(sem.numero,i);}}
          style={{width:34,height:34,borderRadius:"50%",background:isDone?sem.color:"transparent",border:`2px solid ${isDone?sem.color:"#2a2d3a"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {isDone&&<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8L6.5 11.5L13 5" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:2,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:11,fontWeight:700,color:sem.color,letterSpacing:1}}>{d.dia.toUpperCase()}</span>
            <span style={{color:"#333"}}>·</span>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:isDone?"#b8a87a":"#999"}}>{d.aspecto}</span>
          </div>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#555"}}>{d.versiculo}</div>
        </div>
        <svg className="expand-arrow" style={{transform:isExp?"rotate(180deg)":"rotate(0deg)",flexShrink:0}} width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6L8 10L12 6" stroke="#444" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      {isExp&&(
        <div style={{padding:"0 18px 18px"}}>
          <div style={{background:"#0a0c12",borderLeft:`3px solid ${sem.color}`,borderRadius:"0 8px 8px 0",padding:"12px 14px",marginBottom:10}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:5}}>{d.versiculo.toUpperCase()}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:"#c0b090",lineHeight:1.75,fontStyle:"italic"}}>{d.texto}</div>
          </div>
          <div style={{background:"#0f1117",border:"1px solid #1a1d26",borderRadius:8,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#666",fontWeight:700,letterSpacing:2,marginBottom:5}}>✦ REFLEXIÓN</div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#aaa",lineHeight:1.8}}>{d.reflexion}</div>
          </div>
          <button className="action-btn" onClick={()=>toggle(sem.numero,i)}
            style={{width:"100%",padding:"10px",borderRadius:8,border:`1px solid ${isDone?sem.color:"#2a2d3a"}`,background:isDone?`${sem.color}20`:"transparent",color:isDone?sem.color:"#777",fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:700,letterSpacing:1}}>
            {isDone?"✓  COMPLETADO — clic para desmarcar":"MARCAR COMO COMPLETADO"}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── FULL DAY ─────────────────────────────────────────────────────────────────

            <span style={{color:"#333"}}>·</span>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:14,color:isDone?"#c8b880":"#bbb",fontWeight:isDone?700:400}}>{d.aspecto}</span>
          </div>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#555"}}>{d.pasajePrincipal.ref} · {d.pasajeApoyo.ref}</div>
        </div>
        <svg className="expand-arrow" style={{transform:isExp?"rotate(180deg)":"rotate(0deg)",flexShrink:0}} width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6L8 10L12 6" stroke="#444" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>

      {isExp&&(
        <div style={{padding:"0 20px 22px"}}>

          {/* Enseñanza */}
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:10}}>ENSEÑANZA DEL DÍA</div>
            {d.ensenanza.split("\n\n").map((p,idx)=>(

                <span style={{color:sem.color,fontSize:13}}>❝</span>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2}}>HISTORIA DEL DÍA</div>
              </div>
              {d.historia.split("\n\n").map((p,idx)=>(
                <p key={idx} style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#9a9080",lineHeight:1.85,marginBottom:8,fontStyle:"italic"}}>{p}</p>
              ))}

          )}

          {/* Estudio Bíblico */}
          <div style={{background:"#0a0c12",border:`1px solid ${sem.color}30`,borderRadius:10,padding:"16px",marginBottom:16}}>

              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#d4c090",lineHeight:1.8,fontStyle:"italic"}}>{d.pasajePrincipal.texto}</div>
            </div>

            {/* Contexto */}
            <div style={{background:"#0f1117",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#666",fontWeight:700,letterSpacing:2,marginBottom:6}}>CONTEXTO BÍBLICO</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#8a8070",lineHeight:1.8}}>{d.contextoBiblico}</div>
            </div>

            {/* Pasaje apoyo */}
            <div style={{borderLeft:`2px solid ${sem.color}66`,paddingLeft:14,marginBottom:14}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#777",fontWeight:700,letterSpacing:2,marginBottom:6}}>PASAJE DE APOYO · {d.pasajeApoyo.ref.toUpperCase()}</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:"#b8a880",lineHeight:1.8,fontStyle:"italic"}}>{d.pasajeApoyo.texto}</div>
            </div>

            {/* Conexión */}
            <div style={{borderTop:`1px solid ${sem.color}20`,paddingTop:12}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:6}}>CONEXIÓN CON EL PASO</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#a09888",lineHeight:1.85}}>{d.conexion}</div>
            </div>
          </div>

          {/* Preguntas */}
          <div style={{background:"#0f1117",border:"1px solid #1a1d26",borderRadius:10,padding:"14px 16px",marginBottom:14}}>

            {d.preguntas.map((q,qi)=>(
              <div key={qi} style={{borderLeft:`2px solid ${sem.color}50`,paddingLeft:12,marginBottom:qi<2?12:0}}>

                <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#b0a898",lineHeight:1.8}}>{q}</div>
              </div>
            ))}
          </div>

          {/* Práctica */}
          <div style={{background:`${sem.color}0c`,border:`1px solid ${sem.color}30`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>

            style={{width:"100%",padding:"11px",borderRadius:8,border:`1px solid ${isDone?sem.color:"#2a2d3a"}`,background:isDone?`${sem.color}22`:"transparent",color:isDone?sem.color:"#777",fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:700,letterSpacing:1}}>
            {isDone?"✓  COMPLETADO — clic para desmarcar":"MARCAR COMO COMPLETADO"}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [semanaIdx, setSemanaIdx] = useState(0);
  const [done, setDone] = useState({});
  const [expanded, setExpanded] = useState(null);

  useEffect(()=>{setDone(getCookie());},[]);

  const toggle = useCallback((s,d)=>{
    const k=`${s}-${d}`;
    setDone(prev=>{
      const next={...prev};
      next[k]?delete next[k]:(next[k]=1);
      saveCookie(next);
      return next;
    });
  },[]);

  const totalDone = Object.keys(done).length;
  const pct = Math.round((totalDone/TOTAL)*100);
  const sem = SEMANAS[semanaIdx];
  const semDone = sem.dias.filter((_,i)=>done[`${sem.numero}-${i}`]).length;
  const reset = ()=>{ if(confirm("¿Reiniciar todo el progreso?")){setDone({});saveCookie({});} };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#0f1117"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1a1d26,#12151e)",borderBottom:"1px solid #1e2130",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{color:"#c49a00",fontSize:20}}>✦</span>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#e8e0d0"}}>Guía Bíblica</div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#555",letterSpacing:1}}>12 PASOS · LIBERTAD DE LA CODEPENDENCIA</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#555",marginBottom:4}}>PROGRESO TOTAL</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:90,height:5,background:"#1e2130",borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#c49a00,#e8c547)",borderRadius:3,transition:"width 0.4s"}}/>
              </div>
              <span style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#c49a00",fontWeight:700}}>{pct}%</span>
            </div>
          </div>
          <button onClick={reset} style={{background:"transparent",border:"1px solid #2a2d3a",borderRadius:6,padding:"4px 10px",color:"#555",cursor:"pointer",fontSize:11,fontFamily:"'Lato',sans-serif"}}>↺</button>
        </div>
      </div>

      <div className="layout" style={{display:"flex",flex:1}}>

        {/* SIDEBAR */}

          <div style={{padding:"14px 12px 6px"}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#444",letterSpacing:2}}>SEMANAS</div>
          </div>
          {SEMANAS.map((s,i)=>{
            const c=s.dias.filter((_,j)=>done[`${s.numero}-${j}`]).length;
            const p=Math.round((c/6)*100);
            const active=semanaIdx===i;
            return (
              <button key={i} className="week-btn" onClick={()=>{setSemanaIdx(i);setExpanded(null);}}
                style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",background:active?`${s.color}1a`:"transparent",borderLeft:active?`3px solid ${s.color}`:"3px solid transparent"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:active?s.color:"#1a1d26",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,fontFamily:"'Lato',sans-serif",color:active?"#fff":"#555",flexShrink:0}}>
                  {s.numero}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
                    <div style={{fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:700,color:active?"#e8e0d0":"#777",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.titulo}</div>
                    {!s.completo&&<span style={{fontSize:9,color:"#444",flexShrink:0}}>✎</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{flex:1,height:3,background:"#1a1d26",borderRadius:2,overflow:"hidden"}}>
                      <div style={{width:`${p}%`,height:"100%",background:s.color,transition:"width 0.3s"}}/>

                    <span style={{fontSize:10,color:p===100?"#c49a00":"#444",fontFamily:"'Lato',sans-serif"}}>{c}/6</span>

                {p===100&&<span style={{color:"#c49a00",fontSize:13}}>✓</span>}
              </button>
            );

            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#444",marginBottom:4}}>✎ = contenido próximamente</div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#444",marginBottom:4}}>{totalDone}/{TOTAL} días completados</div>
            <div style={{width:"100%",height:5,background:"#1a1d26",borderRadius:3,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#c49a00,#e8c547)",transition:"width 0.4s"}}/>
            </div>
          </div>
        </div>

        {/* MAIN */}
        <div className="main-content" style={{flex:1,overflowY:"auto",padding:"28px 28px 60px",maxHeight:"calc(100vh - 57px)"}}>

          {/* Week header */}
          <div style={{marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{width:44,height:44,borderRadius:"50%",background:sem.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,fontFamily:"'Lato',sans-serif",color:"#fff",flexShrink:0}}>{sem.numero}</div>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}>
                  <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:sem.color,letterSpacing:2,fontWeight:700}}>{sem.paso.toUpperCase()}</div>
                  {!sem.completo&&<span style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#555",background:"#1a1d26",border:"1px solid #2a2d3a",borderRadius:4,padding:"1px 6px",letterSpacing:1}}>PRÓXIMAMENTE</span>}
                </div>
                <h1 className="week-title" style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#e8e0d0",lineHeight:1.2}}>{sem.titulo}</h1>
              </div>
            </div>
            <p style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#777",lineHeight:1.7,fontStyle:"italic",maxWidth:600,marginBottom:8}}>{sem.descripcion}</p>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:16}}>
              <span style={{color:sem.color,fontSize:11}}>✦</span>
              <span style={{fontFamily:"'Lato',sans-serif",fontSize:12,color:"#888"}}>Tema central: <span style={{color:"#b8a87a"}}>{sem.tema}</span></span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {sem.dias.map((_,i)=>(
                <div key={i} style={{flex:1,height:4,borderRadius:2,background:done[`${sem.numero}-${i}`]?sem.color:"#1e2130",transition:"background 0.3s"}}/>
              ))}
              <span style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:semDone===6?"#c49a00":"#555",whiteSpace:"nowrap",marginLeft:4}}>
                {semDone===6?"✓ Completa":`${semDone}/6`}
              </span>
            </div>
          </div>

          {/* Day cards */}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {sem.dias.map((d,i)=>
              sem.completo
                ?<FullDay key={i} d={d} i={i} sem={sem} done={done} toggle={toggle} expanded={expanded} setExpanded={setExpanded}/>
                :<PlaceholderDay key={i} d={d} i={i} sem={sem} done={done} toggle={toggle} expanded={expanded} setExpanded={setExpanded}/>
            )}
          </div>

          {/* Tarea semanal */}
          {sem.completo&&sem.tarea&&(
            <div style={{marginTop:28,background:"#0d1018",border:`1px solid ${sem.color}30`,borderRadius:12,padding:"20px 22px"}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:14}}>✦ TAREA DE LA SEMANA</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#555",marginBottom:12,lineHeight:1.6}}>Preguntas de Melody Beattie para reflexionar en tu diario o con alguien de confianza:</div>
              {sem.tarea.map((t,ti)=>(
                <div key={ti} style={{display:"flex",gap:12,marginBottom:10}}>
                  <div style={{width:22,height:22,borderRadius:"50%",background:`${sem.color}20`,border:`1px solid ${sem.color}50`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Lato',sans-serif",fontSize:10,fontWeight:700,color:sem.color,flexShrink:0}}>{ti+1}</div>
                  <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#a0988a",lineHeight:1.75}}>{t}</div>
                </div>
              ))}
              {sem.tareaVerse&&(
                <div style={{marginTop:16,borderTop:`1px solid ${sem.color}20`,paddingTop:14}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:"#c8b060",lineHeight:1.7,fontStyle:"italic"}}>{sem.tareaVerse.texto}</div>
                  <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:sem.color,marginTop:4,letterSpacing:1}}>{sem.tareaVerse.ref.toUpperCase()}</div>
                </div>
              )}
            </div>
          )}

          {/* Navigation */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:36,paddingTop:20,borderTop:"1px solid #1a1d26"}}>
            <button className="nav-btn" disabled={semanaIdx===0} onClick={()=>{setSemanaIdx(semanaIdx-1);setExpanded(null);}}
              style={{padding:"9px 18px",borderRadius:8,border:"1px solid #1e2130",background:"transparent",color:semanaIdx===0?"#2a2d3a":"#666",fontFamily:"'Lato',sans-serif",fontSize:12,cursor:semanaIdx===0?"default":"pointer"}}>
              ← Semana anterior
            </button>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#444"}}>{semanaIdx+1} / 12</span>
            <button className="nav-btn" disabled={semanaIdx===11} onClick={()=>{setSemanaIdx(semanaIdx+1);setExpanded(null);}}
              style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${semanaIdx===11?"#1e2130":SEMANAS[semanaIdx+1]?.color+"50"}`,background:"transparent",color:semanaIdx===11?"#2a2d3a":"#666",fontFamily:"'Lato',sans-serif",fontSize:12,cursor:semanaIdx===11?"default":"pointer"}}>
              Siguiente semana →
            </button>
          </div>

          {pct===100&&(
            <div style={{marginTop:28,background:"linear-gradient(135deg,#1a1400,#160c00)",border:"1px solid #c49a0030",borderRadius:12,padding:"22px 24px",textAlign:"center"}}>
              <div style={{fontSize:28,marginBottom:10}}>✦</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:"#c49a00",marginBottom:8}}>Has completado las 12 semanas</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#777",lineHeight:1.7,fontStyle:"italic"}}>"El que comenzó en vosotros la buena obra, la perfeccionará hasta el día de Jesucristo."</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#c49a00",marginTop:6,letterSpacing:2}}>FILIPENSES 1:6</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
