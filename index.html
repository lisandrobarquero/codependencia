      {dia:"Sábado",aspecto:"El crecimiento como proceso sin fin",versiculo:"Filipenses 1:6",texto:'"Estando persuadido de esto, que el que comenzó en vosotros la buena obra, la perfeccionará hasta el día de Jesucristo."',reflexion:"¿Cómo te tratas cuando sientes que no has avanzado suficiente? ¿Puedes confiar en que Dios sigue trabajando en ti?"}
    ]
  },
  {
    numero:11, paso:"Paso 11", titulo:"Conexión Espiritual",
    descripcion:"Buscamos mejorar nuestro contacto consciente con Dios a través de la oración y la meditación.",
    tema:"Cultivar una vida interior profunda", color:"#2D5A8E",
    dias:[
      {dia:"Lunes",aspecto:"La práctica de la quietud",versiculo:"Salmo 46:10",texto:'"Estad quietos, y conoced que yo soy Dios."',reflexion:"¿Qué tan cómodo te sientes en el silencio? ¿Qué evitas sentir o escuchar cuando te quedas quieto?"},
      {dia:"Martes",aspecto:"Escuchar a Dios en voz mansa",versiculo:"1 Reyes 19:12",texto:'"Tras el terremoto, un fuego; pero el Señor no estaba en el fuego. Y tras el fuego, una voz apacible y delicada."',reflexion:"¿Dónde y cuándo sientes más claramente la presencia de Dios? ¿Cómo puedes crear más espacio para eso?"},
      {dia:"Miércoles",aspecto:"Una vida de oración continua",versiculo:"1 Tesalonicenses 5:17",texto:'"Orad sin cesar."',reflexion:"La oración no es solo un momento formal. ¿Cómo sería hablar con Dios a lo largo de todo tu día?"},
      {dia:"Jueves",aspecto:"La meditación en su Palabra",versiculo:"Salmo 1:1-3",texto:'"En la ley del Señor está su delicia, y en su ley medita de día y de noche. Será como árbol plantado junto a corrientes de aguas."',reflexion:"¿Tienes un hábito de leer y meditar en la Biblia? ¿Qué texto te ha hablado profundamente últimamente?"},
      {dia:"Viernes",aspecto:"Conocer la voluntad de Dios",versiculo:"Romanos 12:2",texto:'"Transformaos por medio de la renovación de vuestro entendimiento, para que comprobéis cuál es la voluntad de Dios."',reflexion:"¿Cómo disciernes la voluntad de Dios en tu vida? ¿Qué rol tienen la Palabra, la oración y la comunidad?"},
      {dia:"Sábado",aspecto:"El valor para vivir lo que escuchamos",versiculo:"Josué 1:9",texto:'"¿No te lo he mandado yo? Esfuérzate y sé valiente; no temas ni desmayes, porque el Señor tu Dios estará contigo."',reflexion:"¿Hay algo que Dios te ha hablado pero todavía no has tenido el valor de actuar? ¿Qué necesitas de Él?"}
    ]
  },
  {
    numero:12, paso:"Paso 12", titulo:"El Servicio",
    descripcion:"Habiendo logrado un despertar espiritual, tratamos de llevar este mensaje a otros y de practicar estos principios en todos los aspectos de nuestra vida.",
    tema:"Compartir desde la abundancia, no desde la necesidad", color:"#8B1A1A",
    dias:[
      {dia:"Lunes",aspecto:"Compartir lo que hemos recibido",versiculo:"2 Corintios 1:3-4",texto:'"…quien nos consuela en todas nuestras tribulaciones, para que también nosotros podamos consolar a los que están en cualquier tribulación."',reflexion:"¿Qué has aprendido en este camino que podría ser de ayuda para alguien más?"},
      {dia:"Martes",aspecto:"Ser canal, no salvador",versiculo:"1 Corintios 3:6-7",texto:'"Yo planté, Apolos regó; pero el crecimiento lo ha dado Dios. Así que ni el que planta es algo, ni el que riega, sino Dios."',reflexion:"¿Cómo distingues entre ayudar genuinamente y caer en el patrón de querer salvar o controlar a otros?"},
      {dia:"Miércoles",aspecto:"Llevar el mensaje con humildad",versiculo:"Gálatas 6:1",texto:'"Hermanos, si alguno fuere sorprendido en alguna falta, vosotros que sois espirituales, restauradle con espíritu de mansedumbre."',reflexion:"¿Con qué actitud quieres acompañar a otros? ¿Desde la experiencia compartida o desde la superioridad?"},
      {dia:"Jueves",aspecto:"Los principios en todas las áreas",versiculo:"Colosenses 3:17",texto:'"Y todo lo que hacéis, sea de palabra o de hecho, hacedlo todo en el nombre del Señor Jesús."',reflexion:"¿En qué área de tu vida te cuesta más aplicar los principios de este camino?"},
      {dia:"Viernes",aspecto:"La vida integrada",versiculo:"Miqueas 6:8",texto:'"Solamente hacer justicia, y amar misericordia, y humillarte ante tu Dios."',reflexion:"Al llegar al final de estas 12 semanas, ¿cuál es la transformación más significativa que notas en ti?"},
      {dia:"Sábado",aspecto:"El fruto del camino recorrido",versiculo:"Juan 15:16",texto:'"No me elegisteis vosotros a mí, sino que yo os elegí a vosotros, y os he puesto para que vayáis y llevéis fruto, y vuestro fruto permanezca."',reflexion:"¿Qué fruto quieres que permanezca en tu vida? Escribe una carta de gratitud a Dios por lo que ha hecho."}
    ]
  }
];

const TOTAL = 72;
const COOKIE = "guia_biblica_v1";

function getCookie() {
  try {
    const m = document.cookie.split("; ").find(r => r.startsWith(COOKIE + "="));
    return m ? JSON.parse(decodeURIComponent(m.split("=")[1])) : {};
  } catch { return {}; }
}
function saveCookie(data) {
  const exp = new Date(); exp.setFullYear(exp.getFullYear() + 2);
  document.cookie = `${COOKIE}=${encodeURIComponent(JSON.stringify(data))}; expires=${exp.toUTCString()}; path=/`;
}

function App() {
  const [semanaIdx, setSemanaIdx] = useState(0);
  const [done, setDone] = useState({});
  const [expanded, setExpanded] = useState(null);

  useEffect(() => { setDone(getCookie()); }, []);

  const toggle = useCallback((s, d) => {
    const k = `${s}-${d}`;
    setDone(prev => {
      const next = {...prev};
      next[k] ? delete next[k] : (next[k] = 1);
      saveCookie(next);
      return next;
    });
  }, []);

  const totalDone = Object.keys(done).length;
  const pct = Math.round((totalDone / TOTAL) * 100);
  const sem = SEMANAS[semanaIdx];
  const semDone = sem.dias.filter((_,i) => done[`${sem.numero}-${i}`]).length;

  const reset = () => {
    if (confirm("¿Reiniciar todo el progreso?")) { setDone({}); saveCookie({}); }
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#0f1117"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1a1d26,#12151e)",borderBottom:"1px solid #1e2130",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <span style={{color:"#c49a00",fontSize:20}}>✦</span>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#e8e0d0"}}>Guía Bíblica</div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#555",letterSpacing:1}}>12 PASOS · LIBERTAD DE LA CODEPENDENCIA</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#555",marginBottom:4}}>PROGRESO TOTAL</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:90,height:5,background:"#1e2130",borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#c49a00,#e8c547)",borderRadius:3,transition:"width 0.4s"}}/>
              </div>
              <span style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#c49a00",fontWeight:700}}>{pct}%</span>
            </div>
          </div>
          <button onClick={reset} style={{background:"transparent",border:"1px solid #2a2d3a",borderRadius:6,padding:"4px 10px",color:"#555",cursor:"pointer",fontSize:11,fontFamily:"'Lato',sans-serif"}}>↺</button>
        </div>
      </div>

      {/* LAYOUT */}
      <div className="layout" style={{display:"flex",flex:1}}>

        {/* SIDEBAR */}
        <div className="sidebar" style={{width:250,background:"#0d1018",borderRight:"1px solid #1e2130",overflowY:"auto",flexShrink:0,maxHeight:"calc(100vh - 57px)",position:"sticky",top:57}}>
          <div style={{padding:"14px 12px 6px"}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#444",letterSpacing:2}}>SEMANAS</div>
          </div>
          {SEMANAS.map((s,i) => {
            const c = s.dias.filter((_,j) => done[`${s.numero}-${j}`]).length;
            const p = Math.round((c/6)*100);
            const active = semanaIdx === i;
            return (
              <button key={i} className="week-btn" onClick={() => { setSemanaIdx(i); setExpanded(null); }}
                style={{display:"flex",alignItems:"center",gap:10,padding:"9px 14px",background:active?`${s.color}1a`:"transparent",borderLeft:active?`3px solid ${s.color}`:"3px solid transparent"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:active?s.color:"#1a1d26",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,fontFamily:"'Lato',sans-serif",color:active?"#fff":"#555",flexShrink:0}}>{s.numero}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:700,color:active?"#e8e0d0":"#777",marginBottom:3,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.titulo}</div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{flex:1,height:3,background:"#1a1d26",borderRadius:2,overflow:"hidden"}}>
                      <div style={{width:`${p}%`,height:"100%",background:s.color,transition:"width 0.3s"}}/>
                    </div>
                    <span style={{fontSize:10,color:p===100?"#c49a00":"#444",fontFamily:"'Lato',sans-serif"}}>{c}/6</span>
                  </div>
                </div>
                {p===100 && <span style={{color:"#c49a00",fontSize:13}}>✓</span>}
              </button>
            );
          })}
          <div style={{padding:"12px 14px",borderTop:"1px solid #1a1d26",marginTop:4}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#444",marginBottom:4}}>{totalDone}/{TOTAL} días completados</div>
            <div style={{width:"100%",height:5,background:"#1a1d26",borderRadius:3,overflow:"hidden"}}>
              <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#c49a00,#e8c547)",transition:"width 0.4s"}}/>
            </div>
          </div>
        </div>

        {/* MAIN */}
        <div className="main-content" style={{flex:1,overflowY:"auto",padding:"28px 28px 60px",maxHeight:"calc(100vh - 57px)"}}>

          {/* Week header */}
          <div style={{marginBottom:28}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{width:42,height:42,borderRadius:"50%",background:sem.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:700,fontFamily:"'Lato',sans-serif",color:"#fff",flexShrink:0}}>{sem.numero}</div>
              <div>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:sem.color,letterSpacing:2,fontWeight:700,marginBottom:2}}>{sem.paso.toUpperCase()}</div>
                <h1 className="week-title" style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,color:"#e8e0d0",lineHeight:1.2}}>{sem.titulo}</h1>
              </div>
            </div>
            <p style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#777",lineHeight:1.7,fontStyle:"italic",maxWidth:580,marginBottom:8}}>{sem.descripcion}</p>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14}}>
              <span style={{color:sem.color,fontSize:11}}>✦</span>
              <span style={{fontFamily:"'Lato',sans-serif",fontSize:12,color:"#888"}}>Tema central: <span style={{color:"#b8a87a"}}>{sem.tema}</span></span>
            </div>
            {/* mini progress dots */}
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              {sem.dias.map((_,i) => (
                <div key={i} style={{flex:1,height:4,borderRadius:2,background:done[`${sem.numero}-${i}`]?sem.color:"#1e2130",transition:"background 0.3s"}}/>
              ))}
              <span style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:semDone===6?"#c49a00":"#555",whiteSpace:"nowrap",marginLeft:4}}>
                {semDone===6?"✓ Completa":`${semDone}/6`}
              </span>
            </div>
          </div>

          {/* Day cards */}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            {sem.dias.map((d,i) => {
              const k = `${sem.numero}-${i}`;
              const isDone = !!done[k];
              const isExp = expanded === i;
              return (
                <div key={i} className="day-card" style={{background:isDone?`${sem.color}0e`:"#13161f",border:`1px solid ${isDone?sem.color+"40":"#1e2130"}`,borderRadius:10,overflow:"hidden"}}>
                  {/* Header row */}
                  <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",cursor:"pointer"}} onClick={() => setExpanded(isExp ? null : i)}>
                    {/* Checkbox */}
                    <div className="check-circle" onClick={e=>{e.stopPropagation();toggle(sem.numero,i);}}
                      style={{width:34,height:34,borderRadius:"50%",background:isDone?sem.color:"transparent",border:`2px solid ${isDone?sem.color:"#2a2d3a"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {isDone && <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8L6.5 11.5L13 5" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:2,flexWrap:"wrap"}}>
                        <span style={{fontFamily:"'Lato',sans-serif",fontSize:11,fontWeight:700,color:sem.color,letterSpacing:1}}>{d.dia.toUpperCase()}</span>
                        <span style={{color:"#333"}}>·</span>
                        <span style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:isDone?"#b8a87a":"#999"}}>{d.aspecto}</span>
                      </div>
                      <div style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#555"}}>{d.versiculo}</div>
                    </div>
                    <svg className="expand-arrow" style={{transform:isExp?"rotate(180deg)":"rotate(0deg)",flexShrink:0}} width="16" height="16" viewBox="0 0 16 16" fill="none">
                      <path d="M4 6L8 10L12 6" stroke="#444" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                    </svg>
                  </div>

                  {/* Expanded body */}
                  {isExp && (
                    <div style={{padding:"0 18px 18px"}}>
                      <div style={{background:"#0a0c12",borderLeft:`3px solid ${sem.color}`,borderRadius:"0 8px 8px 0",padding:"12px 14px",marginBottom:10}}>
                        <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:5}}>{d.versiculo.toUpperCase()}</div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:"#c0b090",lineHeight:1.75,fontStyle:"italic"}}>{d.texto}</div>
                      </div>
                      <div style={{background:"#0f1117",border:"1px solid #1a1d26",borderRadius:8,padding:"12px 14px",marginBottom:12}}>
                        <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#666",fontWeight:700,letterSpacing:2,marginBottom:5}}>✦ REFLEXIÓN DEL DÍA</div>
                        <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#aaa",lineHeight:1.8}}>{d.reflexion}</div>
                      </div>
                      <button className="action-btn" onClick={() => toggle(sem.numero,i)}
                        style={{width:"100%",padding:"10px",borderRadius:8,border:`1px solid ${isDone?sem.color:"#2a2d3a"}`,background:isDone?`${sem.color}20`:"transparent",color:isDone?sem.color:"#777",fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:700,letterSpacing:1}}>
                        {isDone ? "✓  COMPLETADO — clic para desmarcar" : "MARCAR COMO COMPLETADO"}
                      </button>
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Navigation */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:36,paddingTop:20,borderTop:"1px solid #1a1d26"}}>
            <button className="nav-btn" disabled={semanaIdx===0} onClick={() => {setSemanaIdx(semanaIdx-1);setExpanded(null);}}
              style={{padding:"9px 18px",borderRadius:8,border:"1px solid #1e2130",background:"transparent",color:semanaIdx===0?"#2a2d3a":"#666",fontFamily:"'Lato',sans-serif",fontSize:12,cursor:semanaIdx===0?"default":"pointer"}}>
              ← Semana anterior
            </button>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#444"}}>{semanaIdx+1} / 12</span>
            <button className="nav-btn" disabled={semanaIdx===11} onClick={() => {setSemanaIdx(semanaIdx+1);setExpanded(null);}}
              style={{padding:"9px 18px",borderRadius:8,border:`1px solid ${semanaIdx===11?"#1e2130":SEMANAS[semanaIdx+1]?.color+"50"}`,background:"transparent",color:semanaIdx===11?"#2a2d3a":"#666",fontFamily:"'Lato',sans-serif",fontSize:12,cursor:semanaIdx===11?"default":"pointer"}}>
              Siguiente semana →
            </button>
          </div>

          {/* Completion banner */}
          {pct===100 && (
            <div style={{marginTop:28,background:"linear-gradient(135deg,#1a1400,#160c00)",border:"1px solid #c49a0030",borderRadius:12,padding:"22px 24px",textAlign:"center"}}>
              <div style={{fontSize:28,marginBottom:10}}>✦</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,color:"#c49a00",marginBottom:8}}>Has completado las 12 semanas</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#777",lineHeight:1.7,fontStyle:"italic"}}>"El que comenzó en vosotros la buena obra, la perfeccionará hasta el día de Jesucristo."</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#c49a00",marginTop:6,letterSpacing:2}}>FILIPENSES 1:6</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
