"dia": "Lunes",
"aspecto": "La ilusión del control",
"ensenanza": "Muchos llegamos al Primer Paso convencidos de que el problema está en el otro. Creemos que controlar es nuestra responsabilidad, nuestra obligación, incluso nuestra manera de amar. Melody Beattie lo describe con claridad: creía estar en completo control de sí misma y de los demás, que no existía circunstancia que no pudiera manejar mediante pura fuerza de voluntad. Controlar no era un defecto — era lo que se esperaba de ella. Era la única manera de sobrevivir.\n\nEl problema es que el control sobre la vida de otro es una ilusión. No existe. Por más que lo intentemos, no podemos hacer que otro cambie, sienta, decida o crezca. Y mientras gastamos nuestra energía intentando lo imposible, nuestra propia vida — nuestros sentimientos, nuestras necesidades, nuestros sueños — queda abandonada.\n\nEl Primer Paso no nos pide que nos rindamos ante la vida. Nos pide que nos rindamos ante la ilusión.",
"historia": "Había alguien a quien Melody amaba que bebía mucho. Ella había hecho todo lo posible para lograr que dejara de beber. Nada funcionaba.\n\nEntonces dio con el plan perfecto: le demostraría cómo se sentía amar a alguien que usaba sustancias. Con cuidado montó la escena — un paquetito de azúcar glass, una cuchara quemada, una bolita de algodón — y se acostó en el sofá para que pareciera que estaba bajo los efectos de un narcótico.\n\nCuando el alcohólico entró al cuarto, Melody saltó del sofá y comenzó a sermonear: \"¡Ya ves! ¡Ves cómo se siente amar a alguien y verlo usar drogas!\"\n\nEsa noche, una vecina le dijo algo que tardó meses en entender: \"Lo que estás haciendo es verdaderamente una locura. Necesitás ir a Al-Anon.\"\n\nMelody no necesitaba demostrarle al alcohólico cuánto dolor padecía. Necesitaba tomar conciencia de cuánto dolor padecía ella. Necesitaba comenzar a cuidarse a sí misma.",

"preguntas": [

"Proverbios 16:9 dice que el Señor dirige los pasos — no nosotros los de otro. ¿Qué área de la vida de otra persona estás intentando dirigir que le corresponde a Dios? ¿Qué pasaría si te retiraras de ese lugar?",

{
"dia": "Martes",
"aspecto": "Las formas de la ingobernabilidad",
"ensenanza": "Cuando el Primer Paso habla de ingobernabilidad, no habla únicamente de caos visible. La ingobernabilidad puede ser externa — relaciones rotas, finanzas destruidas, salud deteriorada — pero también puede ser interna: pensamientos obsesivos, emociones que no podemos manejar, una corriente constante de miedo, resentimiento o vacío.\n\nBeattie identifica algo poderoso: mientras estamos enfocados en la vida del otro, no podemos ver la ingobernabilidad en la nuestra. Era buena para ver los comportamientos de otro. Sin embargo, no podía ver el caos en su propia vida — las deudas, la salud quebrada, las relaciones tensas, la espiritualidad en bancarrota — todo esto a los treinta y dos años.\n\nLa ingobernabilidad entra cuando dejamos de ejercer nuestro verdadero poder: pensar, sentir, tomar decisiones y vivir nuestra propia vida. En el momento en que intentamos ejercer poder donde no lo tenemos, sacrificamos el poder que sí tenemos.",
"historia": "Stanley era un arquitecto exitoso de unos cincuenta años. Tardó dieciséis años en reconocer el caos en su vida.\n\nSu hijo John causaba problemas desde los seis años. Stanley pasó dos décadas negociando con escuelas, policías y terapeutas. Gastó veinte mil dólares en terapia. Vendió su casa y cambió de ciudad para que John pudiera graduarse. Su esposa lo abandonó. Sus otros hijos también se fueron. Hubo noches en que Stanley terminó en urgencias con cuarenta y cinco puntos en la cabeza.\n\nUn día, un muchacho de dieciséis años tenía el control total de la casa.\n\n\"Estaba agotado, y me sentía totalmente carente de autoestima, de valor como ser humano\", dijo.\n\nStanley comenzó a asistir a juntas de Al-Anon. Lo que siguió fue una transformación: bajó más de cincuenta kilos, recuperó su paz, reconstruyó su relación con su hijo. No porque controlara el resultado — sino porque dejó de intentarlo.",
"pasajePrincipal": {

"conexion": "Romanos 7 y Salmo 32 describen juntos lo que es vivir en ingobernabilidad: por dentro, un ciclo que no podemos romper solos; en el cuerpo, el peso físico de lo no resuelto. David habla de huesos que envejecen, de verdor que se convierte en sequía — imágenes de lo que le pasa al cuerpo cuando el alma carga lo que no puede. Stanley lo vivió en carne propia. La ingobernabilidad no es solo un concepto espiritual — es algo que el cuerpo registra.",

{
"dia": "Miércoles",

"ensenanza": "La codependencia no nace en la adultez. Nace mucho antes, en hogares donde aprendimos que suprimir nuestros sentimientos era la única manera de sobrevivir. Donde aprendimos que el amor se ganaba siendo perfectos, siendo útiles, siendo invisibles. Donde aprendimos — a veces sin que nadie lo dijera en palabras — que éramos responsables de los sentimientos de otros.\n\nBeattie lo describe así: no éramos defectuosos. Sencillamente repetíamos lo que aprendimos, a veces a muy temprana edad — protegiéndonos mediante el intento de controlar a otros, o permitiendo que otros nos controlaran. Nos convertimos en adultos cuidadores y controladores que perdieron contacto con una meta real: amarse y aceptarse a sí mismos.\n\nLo que funciona para sobrevivir en la infancia no funciona para vivir en la adultez. Pero el problema es que esos patrones se sienten tan naturales, tan automáticos, que ni los vemos. Creemos que así somos. No es así: así aprendimos.",
"historia": "Jackie creció escuchando que ella hacía sufrir a su madre. Desde los tres años le inculcaron esa idea. Llegó a la adultez convencida de que tenía el poder de hacer sufrir a las personas, hacerlas felices, hacerlas sentir.\n\n\"Era una responsabilidad tremenda y muy equivocada. Me ponía de cabeza tratando de controlar cómo se sentían los demás. Llegué a odiar estar cerca de las personas porque ser responsable de su manera de sentir era una tarea terriblemente pesada.\"\n\nMarcia aprendió algo aún más extremo: que tenía poder sobre la vida o la muerte de su madre. En la secundaria, su madre intentaba suicidarse periódicamente. Marcia corría de la escuela, apagaba el horno, ventilaba la casa, acostaba a su madre. Luego volvía a clases.\n\n\"A muy temprana edad aprendí que tenía un enorme poder sobre la vida de otros.\"\n\nNinguna de las dos eligió creer eso. Se lo enseñaron. Y como adultas, lo siguieron practicando en todas sus relaciones.",

},

"preguntas": [

"practica": "Pensá en un mensaje que recibiste de niño sobre quién eras o cuál era tu responsabilidad en la familia. Escribilo en una oración. Luego escribí al lado lo que Salmo 139 dice sobre vos. Dejá que ambas oraciones convivan en el papel."

{
"dia": "Jueves",
"aspecto": "El miedo como corriente subterránea",
"ensenanza": "Debajo de todos los comportamientos codependientes — el control, el rescate, el exceso de cuidado, la obsesión — hay una corriente subterránea que los alimenta: el miedo. Miedo al abandono, al rechazo, a la soledad, a no ser suficiente, a que todo se derrumbe si dejamos de controlar.\n\nEl problema es que muchos no lo identificamos como miedo. Lo sentimos como enojo, como hiperresponsabilidad, como urgencia de solucionar, como incapacidad de relajarnos. Beattie lo describe así: el miedo domina la mayor parte de nuestras acciones aunque no lo veamos ni lo sintamos en el momento. Lo que hacemos es fijarnos en los demás — sobre-cuidarlos, controlarlos, pensar obsesivamente en ellos. Lo que no hacemos es cuidar de nosotros mismos de una manera amorosa.\n\nEl miedo crea una energía específica que otros perciben — aunque solo estemos pensando en ello sin actuar. Y esa energía genera exactamente lo que más tememos.",
"historia": "Brad creció con un padre alcohólico. Pasó la mayor parte de su vida solo, desconectado de las personas, exigiéndose demasiado, sin poder mantener una relación.\n\n\"Creo que la mayor parte de mi vida he estado enojado. El coraje era la fuente de mi energía vital. No me enojaba — era como una corriente subterránea que gobernaba mi vida.\"\n\nJane, después de un año en CoDA, llegó a una comprensión que la sacudió:\n\n\"Llegué a comprender qué tan aterrada he estado toda mi vida. Durante todos estos años he vivido a través del miedo.\"\n\nNi Brad ni Jane sabían que lo que sentían era miedo. Brad lo llamaba coraje. Jane simplemente funcionaba desde él sin nombrarlo. El Primer Paso les dio el lenguaje para ver lo que siempre había estado ahí.",
"pasajePrincipal": {
"ref": "1 Juan 4:18",
"texto": "\"En el amor no hay temor, sino que el perfecto amor echa fuera el temor; porque el temor lleva en sí castigo. De donde el que teme, no ha sido perfeccionado en el amor.\""
},
"contextoBiblico": "Juan escribe esta carta a comunidades cristianas que enfrentaban persecución y falsas enseñanzas. En los capítulos 4 y 5 desarrolla la relación entre el amor de Dios y la vida del creyente. El versículo 18 llega después de afirmar que \"Dios es amor\" — y de ahí concluye: si Dios es amor perfecto y ese amor habita en nosotros, el miedo no puede reinar. Juan añade algo poderoso: el miedo \"lleva en sí castigo.\" Quien vive desde el miedo ya está siendo castigado por él, sin necesidad de que nada externo lo lastime.",
"pasajeApoyo": {
"ref": "2 Timoteo 1:7",
"texto": "\"Porque no nos ha dado Dios espíritu de cobardía, sino de poder, de amor y de dominio propio.\""

"conexion": "El espíritu que nos llevó a controlar, a rescatar, a obsesionarnos — ese espíritu de cobardía, de miedo — no viene de Dios. Lo que Dios da es radicalmente distinto: poder (nuestro propio poder legítimo, no el de otros), amor (no el amor compulsivo del cuidador que se pierde a sí mismo) y dominio propio (claridad, no obsesión). 1 Juan 4:18 aclara además que el miedo ya nos está castigando. La libertad no comienza cuando el otro cambia. Comienza cuando el amor de Dios empieza a desplazar el miedo.",
"preguntas": [
"1 Juan 4:18 dice que el miedo lleva en sí castigo — que ya te está castigando. ¿De qué maneras concretas el miedo al abandono, al rechazo o a la pérdida te ha estado castigando en tus relaciones, aunque todavía no haya pasado lo que temés?",
"2 Timoteo 1:7 distingue entre el espíritu de cobardía y el espíritu de poder, amor y dominio propio. ¿Desde cuál de los dos estás operando en tu relación más conflictiva? ¿Cómo se vería operar desde el poder y el dominio propio en lugar del miedo?",
"Brad expresó su miedo como coraje durante décadas sin reconocerlo. ¿Cómo se disfraza tu miedo — como enojo, como hiperactividad, como exceso de cuidado, como pensamiento obsesivo? ¿Podés ponerle el nombre correcto hoy?"
],
"practica": "Sentate en silencio cinco minutos hoy. Preguntate: \"¿De qué tengo miedo realmente?\" No respondas con lo que pensás — respondé con lo que sentís en el cuerpo. Escribí ese miedo sin intentar resolverlo. Solo nombrarlo ya es un acto de honestidad."
},
{
"dia": "Viernes",
"aspecto": "Aceptar la impotencia: rendirse no es derrota",

"historia": "Karen llevaba quince años sobria. Asistía a cinco reuniones por semana, ayudaba constantemente a otros — los necesitaran o no. Pero por dentro estaba tan avergonzada de sí misma como el día en que dejó las drogas. No podía decir que no. Todo lo que hacía lo hacía para que otros la quisieran.\n\n\"Me sentía tan mal acerca de mí misma. Tenía la esperanza de que si ayudaba a suficientes personas, Dios comenzaría a tratarme bien.\"\n\nFue entonces cuando llegó a una comprensión que lo cambió todo:\n\n\"Dios no me obligaba a hacer todas esas cosas. Dios no evitaba que el bien llegara a mi vida. Yo lo hacía. Sabía que necesitaba, quería y me merecía más de mi recuperación. Ya era hora.\"\n\nKaren no necesitaba que Dios cambiara a los demás. Necesitaba dejar de bloquearse a sí misma.",
"pasajePrincipal": {
"ref": "2 Corintios 12:9-10",
"texto": "\"Y me ha dicho: Bástate mi gracia; porque mi poder se perfecciona en la debilidad. Por tanto, de buena gana me gloriaré más bien en mis debilidades, para que repose sobre mí el poder de Cristo. Porque cuando soy débil, entonces soy fuerte.\""
},
"contextoBiblico": "Pablo escribe a la comunidad de Corinto desde una posición vulnerable — está siendo cuestionado como apóstol. En los versículos anteriores describe un \"aguijón en la carne\", algo doloroso que le pidió a Dios tres veces que le quitara. La respuesta de Dios no fue la sanación sino la suficiencia: mi gracia te basta. No te voy a quitar el problema, pero te voy a dar todo lo que necesitás para vivir en él. Pablo descubre algo paradójico: es en la aceptación de su limitación — no en la lucha contra ella — donde el poder de Cristo descansa sobre él.",
"pasajeApoyo": {

"texto": "\"Estad quietos, y conoced que yo soy Dios.\""
},
"conexion": "Pablo le pidió tres veces a Dios que removiera su aguijón. Nosotros le hemos pedido innumerables veces que cambie a la persona que amamos. La respuesta puede ser la misma: bástate mi gracia. No porque Dios sea indiferente al sufrimiento, sino porque hay algo que solo puede ocurrir cuando dejamos de luchar para controlarlo todo: el poder de Dios descansa sobre nosotros. Karen lo descubrió cuando paró: no era Dios quien bloqueaba su recuperación. Era ella misma.",
"preguntas": [

},
{
"dia": "Sábado",
"aspecto": "El desapego: soltar con amor",
"ensenanza": "Beattie llama al Primer Paso \"el Paso del Desapego.\" El desapego no es indiferencia. No es dejar de amar. Es algo muy distinto: es soltar la necesidad de controlar el resultado, permitirle al otro su propio camino, su propio aprendizaje, su propia relación con Dios — mientras nosotros tomamos responsabilidad plena de la nuestra.\n\nEl desapego tiene que ver con límites. Aprendemos qué nos corresponde y qué no. Aprendemos a identificar cuándo estamos intentando hacer lo imposible o lo que no nos corresponde. Y luego — este es el acto más difícil — dirigimos nuestra atención hacia lo posible: vivir nuestra propia vida, cuidar de nosotros mismos, responder a nuestros propios sentimientos.\n\nEl Primer Paso no termina cuando lo leemos. Lo damos al principio de la recuperación. Lo volvemos a dar cuando nos encontramos obsesionando con otro. Lo damos cuando empezamos a abandonarnos. Lo damos cada vez que nos estancamos. Cuando ya no sabemos qué hacer, podemos dar este Paso.",
"historia": null,

},

"pasajeApoyo": {

{
"dia": "Lunes",
"aspecto": "El agujero en el alma",
"ensenanza": "El Primer Paso nos derrotó. Miramos de frente el caos, la ingobernabilidad, el daño que habíamos estado sosteniendo. Y esa honestidad, aunque necesaria, duele. Puede dejarnos en la oscuridad.\n\nEl Segundo Paso llega como un respiro. Como una ventana que se abre. Beattie lo describe así: después de aceptar y admitir su impotencia e ingobernabilidad, el Segundo Paso le trajo alivio y esperanza.\n\nPero antes de que llegue esa esperanza, muchos de nosotros necesitamos nombrar algo más profundo: la sensación de que algo falta en el centro mismo de nuestra vida. No solo en nuestras relaciones, no solo en nuestras decisiones — sino en el alma. El codependiente no solo está dañado por afuera. Está vacío por adentro. Y ese vacío es el punto de partida del Segundo Paso.",
"historia": "Sara era una mujer atractiva que vistía alegremente y hablaba con un fuerte acento. Llevaba años en recuperación de otros problemas, se veía bien por fuera, pero por dentro algo faltaba siempre.\n\n\"Me quité el sobrepeso. Me veía bien. Pero me sentía vacía, como en muchas ocasiones anteriores. Pensé que el vacío tenía que ver con cosas externas.\"\n\nCon el tiempo, Sara lo encontró: adicciones superpuestas, relaciones destructivas, una vida que por fuera parecía funcionar y por dentro era un desastre.\n\n\"Ahora lo llamo 'el complejo del agujero en el alma'\", dijo Sara.\n\nNingún logro externo pudo llenar ese vacío. Ninguna relación. Ningún trabajo. Sara necesitaba algo más grande que ella misma. Y cuando finalmente lo buscó, encontró no solo recuperación — encontró una vida.",
"pasajePrincipal": {
"ref": "Jeremías 2:13",
"texto": "\"Porque dos males ha hecho mi pueblo: me abandonaron a mí, fuente de aguas vivas, y cavaron para sí cisternas rotas que no retienen el agua.\""
},
"contextoBiblico": "Jeremías profetiza a un pueblo que ha abandonado a Dios y ha intentado llenar ese vacío con sustitutos propios — cisternas rotas. La imagen es poderosa: una cisterna rota retiene agua un momento, pero siempre se vacía. El pueblo seguía cavando nuevas cisternas, buscando nuevas soluciones externas, sin regresar a la fuente. Es exactamente la imagen de la codependencia: seguimos buscando en relaciones, en el control de otros, en el reconocimiento externo, algo que solo puede venir de una fuente más profunda.",
"pasajeApoyo": {
"ref": "Juan 7:37-38",
"texto": "\"Si alguno tiene sed, venga a mí y beba. El que cree en mí, como dice la Escritura, de su interior correrán ríos de agua viva.\""
},
"conexion": "Sara lo llamó \"el agujero en el alma.\" Jeremías lo llama abandonar la fuente de aguas vivas para cavar cisternas rotas. El diagnóstico es el mismo: buscamos afuera lo que solo puede llenarse adentro. El Segundo Paso nos invita a dejar de cavar y volvernos a la fuente. No como acto de fuerza de voluntad — sino como acto de apertura. Juan 7:38 promete que de nuestro interior pueden correr ríos de agua viva. Pero primero hay que tener sed. Y reconocer que las cisternas que cavamos no la están saciando.",
"preguntas": [
"Jeremías 2:13 habla de \"cisternas rotas\" — cosas en las que depositamos nuestra esperanza pero que no retienen el agua. ¿Cuáles han sido tus cisternas rotas? ¿En qué personas, logros, relaciones o comportamientos has intentado llenar el vacío interior?",
"Juan 7:38 promete que de tu interior pueden correr ríos de agua viva. ¿Podés imaginar, aunque sea vagamente, cómo sería vivir desde ese lugar en vez de desde el vacío? ¿Qué cambiaría?",
"Sara tardó años en reconocer el \"agujero en el alma\" porque externamente parecía funcionar. ¿Hay algo en tu vida que por fuera parece estar bien pero por dentro se siente vacío? ¿Podés nombrarlo hoy?"
],
"practica": "Escribí en un papel: \"Las cisternas rotas en las que he buscado llenura son...\" y completá la oración con honestidad. No es para juzgarte — es para ver con claridad de dónde has estado bebiendo."
},
{
"dia": "Martes",
"aspecto": "¿Qué es el sano juicio? Es diferente para cada uno",
"ensenanza": "Antes de creer que nos puede ser devuelto el sano juicio, necesitamos entender qué es para nosotros. Y lo primero que el libro hace es deconstruir lo que creíamos que era normal.\n\nMuchos llegamos a la recuperación pensando que es razonable reprimir nuestros sentimientos, quedarnos inmersos en la vergüenza, sentirnos atrapados y sin esperanza. Quizá consideramos normal que las personas apenas aguanten estar vivas. Quizá vemos la victimización como una reacción cotidiana a la vida.\n\nEsa visión cambia cuando identificamos esos comportamientos como codependientes. El sano juicio no es solo lo opuesto a la locura clínica. Es poder sentir todas tus emociones. Es no perder el control de ti mismo en las relaciones. Es estar en paz contigo mismo. Es cuidarte a ti en lugar de cuidar siempre a los demás. Para cada persona se ve diferente.",
"historia": "Craig se transformó de un hombre asustado, iracundo e inseguro en uno confiado, apacible y relajado. Su queja más grande antes de la recuperación era sentirse aislado y desconectado de las personas. Hoy tiene amigos cercanos y puede expresar sus sentimientos. Para él, recuperar el sano juicio significó salir del aislamiento.\n\nDan es ministro. Sus problemas se centraban en no poder expresar su coraje dentro de su matrimonio y no poner límites con sus clientes. \"Atraía personas enfermas y necesitadas. Era bueno para escuchar y no ponía límites. Simplemente se me enganchaban.\"\n\nPara Dan, el sano juicio consistió en aprender a balancear su vida: expresar apropiadamente su coraje, equilibrar su don de escuchar con la capacidad de ser asertivo, y darse crédito por sus cualidades además de reconocer sus defectos.",
"pasajePrincipal": {
"ref": "Romanos 12:2",
"texto": "\"No os conforméis a este siglo, sino transformaos por medio de la renovación de vuestro entendimiento, para que comprobéis cuál es la buena voluntad de Dios, agradable y perfecta.\""
},
"contextoBiblico": "Pablo escribe a la comunidad de Roma, compuesta de personas que venían de contextos muy distintos. La transformación que describe no es una reforma externa sino una renovación profunda del entendimiento. La palabra griega es \"metamorphosis\" — no un ajuste sino una transformación completa de cómo pensamos y percibimos la realidad. Lo que antes parecía normal — la conformidad con los patrones aprendidos — ya no lo es.",
"pasajeApoyo": {
"ref": "Isaías 1:18",
"texto": "\"Venid luego, dice el Señor, y estemos a cuenta: si vuestros pecados fueren como la grana, como la nieve serán emblanquecidos; si fueren rojos como el carmesí, vendrán a ser como blanca lana.\""
},
"conexion": "El sano juicio que propone el Segundo Paso comienza con una renovación del entendimiento — de lo que pensamos que es normal. Romanos 12:2 dice que esta transformación nos permite \"comprobar\" la voluntad de Dios — ver claramente lo que antes no veíamos. Isaías 1:18 nos invita a ese proceso como una conversación con Dios: venid y estemos a cuenta. Es poder ver con ojos nuevos qué es sano y qué no, qué me corresponde y qué no, qué es amor y qué es miedo disfrazado de amor.",
"preguntas": [
"Romanos 12:2 habla de la renovación del entendimiento — cambiar cómo pensamos, no solo cómo actuamos. ¿Qué cosas que antes te parecían \"normales\" en tus relaciones hoy reconocés como señales de codependencia?",
"¿Cómo definirías el sano juicio para tu vida específica? No en abstracto — concretamente: ¿qué significaría para vos vivir con sano juicio en tu relación más conflictiva? ¿En tu relación con vos mismo?",
"Craig encontró el sano juicio en la conexión con otros. Dan lo encontró en poder poner límites. ¿En qué área de tu vida sentís que necesitás que te sea devuelto el sano juicio primero?"
],
"practica": "Completá esta oración en tu diario: \"Para mí, el sano juicio significaría...\" Escribí al menos tres aspectos concretos. Guardá esta definición — va a ser tu brújula durante la recuperación."
},
{
"dia": "Miércoles",
"aspecto": "Ideas torcidas sobre Dios",
"ensenanza": "Muchos de nosotros llegamos al Segundo Paso cargando una imagen de Dios que nos hace daño. Un Dios que nos odia, que nos ha abandonado, que espera que fracasemos, que nos castiga por no ser suficientes. Para algunos, esa imagen fue moldeada por una religión que lastimó. Para otros, por un padre o una madre que representó a Dios de manera destructiva.\n\nEl libro dice algo liberador: este programa es espiritual, no religioso. No nos pide que adoptemos ninguna imagen en particular. Nos pide que luchemos con el concepto hasta encontrar un Poder Superior que realmente podamos creer que tiene interés en nosotros.\n\nNo necesitamos empezar con un entendimiento complejo. Podemos empezar donde estamos, con cualquier cantidad de fe o falta de fe que tengamos en este momento. La lucha es parte del camino.",
"historia": "Tim asistía a juntas de Hijos Adultos de Alcohólicos. Al principio, los Pasos le parecían confusos. Se decía: \"No lo comprendo. No lo comprendo. No lo comprendo.\"\n\nLuego entendió algo: sus padres habían representado a Dios para él, y eran tan disfuncionales que él había concluido: \"Al demonio con Dios.\" La imagen de un padre amoroso y confiable era incomprensible porque los únicos padres que conocía no eran ni lo uno ni lo otro.\n\n\"Ahora\", dijo Tim, \"estoy usando estos Pasos para reinstalar a Dios en mi vida.\"\n\nNo tuvo que fingir que no tenía daño. No tuvo que aceptar una imagen que no le calzaba. Tuvo que luchar — y en esa lucha encontró algo real.",
"pasajePrincipal": {
"ref": "Salmo 103:8-10",
"texto": "\"Misericordioso y clemente es el Señor; lento para la ira y grande en misericordia. No contenderá para siempre, ni para siempre guardará el enojo. No ha hecho con nosotros conforme a nuestros pecados, ni nos ha pagado conforme a nuestras iniquidades.\""
},
"contextoBiblico": "El Salmo 103 es uno de los grandes himnos de alabanza del Antiguo Testamento, escrito por David. En un contexto cultural donde los dioses eran seres caprichosos y vengativos, David presenta una imagen radicalmente distinta: un Dios compasivo, lento para la ira, que no trata a su pueblo según sus faltas. David no lo describe desde la teoría sino desde su experiencia personal: este es el Dios que yo he conocido.",
"pasajeApoyo": {
"ref": "1 Juan 4:16",
"texto": "\"Y nosotros hemos conocido y creído el amor que Dios tiene para con nosotros. Dios es amor; y el que permanece en amor, permanece en Dios, y Dios en él.\""
},
"conexion": "El Dios del Salmo 103 no es el Dios vengativo que muchos tememos. No nos trata según nuestros pecados. No guarda el enojo para siempre. Y 1 Juan va aún más lejos: Dios no solo tiene amor — Dios es amor. Si la imagen de Dios que cargamos no se parece a esto, no estamos mirando a Dios — estamos mirando a las personas que fallaron en representarlo. El Segundo Paso nos invita a luchar con esa imagen hasta encontrar la verdadera.",
"preguntas": [
"Salmo 103:8-10 dice que Dios no nos trata según nuestros pecados ni nos paga según nuestras faltas. ¿Eso coincide con la imagen de Dios que cargás, o la contradice? ¿De dónde viene tu imagen de Dios?",
"1 Juan 4:16 dice que Dios es amor. ¿Podés creer que ese Dios tiene interés en los detalles de tu vida — no solo los grandes, sino también los pequeños? ¿Qué te hace dudar de eso?",
"Tim dijo que estaba \"reinstalando a Dios\" en su vida. Si tuvieras que describir la imagen de Dios que te fue instalada en la infancia vs. la imagen de Dios que desearías poder creer, ¿cómo serían diferentes?"
],
"practica": "Escribí dos columnas: en la primera, describí la imagen de Dios que aprendiste (aunque sea dolorosa o irracional). En la segunda, escribí cómo describe Dios el Salmo 103. Leé las dos columnas en voz alta. ¿Qué sentís?"
},
{
"dia": "Jueves",
"aspecto": "Llegamos a creer: un proceso, no un destino",
"ensenanza": "El Segundo Paso no dice \"creemos\". Dice \"llegamos a creer\". Esa diferencia es todo. No es un punto de llegada — es un camino. Un proceso que comienza con la más mínima apertura y crece con el tiempo, con la experiencia, con ver a otros transformarse.\n\nNo empezamos creyendo que un Poder superior puede devolvernos el sano juicio. Trabajamos hacia ello. Crecemos dentro de nuestra creencia. Y la forma principal en que llegamos a creer es una: ver a otros que vivieron lo que nosotros vivimos y que ahora son diferentes. Ver que es posible.\n\nEl programa es intencional en esto: somos una cadena interminable de curación. El que ya fue curado trae el mensaje al que todavía no puede creer. Y así la fe se transmite de persona a persona, de historia a historia.",
"historia": "Margarita llegó a Al-Anon espiritualmente muerta. \"No sabía qué sentía. Era abusiva y también abusaban de mí.\"\n\nEncontró muchos \"peros\" al programa. Pero encontró algo del cual asirse: el Segundo Paso. No creía todavía. Pero necesitaba que le devolvieran el sano juicio. Se sentía loca.\n\n\"Quería ser curada y devuelta al sano juicio, así que hice como si creyera y seguí viniendo, hasta que llegué a creer, y comenzó a regresar mi sano juicio.\"\n\nStanley, el arquitecto cuya vida fue controlada por su hijo durante dieciséis años, encontró su camino de otra manera: \"Aprendí a soltar viendo a otros que manejaban el mismo tipo de problemas y notando que se veían bien. Hacían algo para llevarlo mejor. Saqué fortaleza de la suya.\"",
"pasajePrincipal": {
"ref": "Marcos 9:23-24",
"texto": "\"Jesús le dijo: Si puedes creer, al que cree todo le es posible. E inmediatamente el padre del muchacho clamó y dijo: Creo; ayuda mi incredulidad.\""
},
"contextoBiblico": "Este pasaje relata el encuentro de un padre desesperado con Jesús. Su hijo sufría desde la infancia y los discípulos no habían podido sanarlo. Cuando Jesús le dice que todo es posible al que cree, el padre responde con una de las frases más honestamente humanas de todo el Evangelio: \"Creo; ayuda mi incredulidad.\" No llega con fe perfecta — llega con fe mezclada con duda, con esperanza mezclada con desesperación. Y Jesús actúa de todos modos.",
"pasajeApoyo": {
"ref": "Hebreos 11:1",
"texto": "\"Es, pues, la fe la certeza de lo que se espera, la convicción de lo que no se ve.\""
},
"conexion": "\"Creo; ayuda mi incredulidad\" es exactamente la oración del Segundo Paso. No llegamos con fe perfecta. Llegamos con lo que tenemos — y eso es suficiente para comenzar. Hebreos 11:1 define la fe como convicción de lo que no se ve todavía. No es certeza de lo que ya vimos. Es la disposición a confiar en lo que todavía no podemos ver. Margarita \"hizo como si creyera\" hasta que creyó. Stanley vio a otros y eso le dio la fe que no tenía. El proceso es el punto.",
"preguntas": [
"El padre del muchacho dijo: \"Creo; ayuda mi incredulidad.\" ¿Podés hacer esa oración hoy con honestidad? ¿Cuánta fe tenés en este momento — aunque sea mínima? ¿Qué es lo que más alimenta tu incredulidad?",
"Hebreos 11:1 define la fe como convicción de lo que no se ve. ¿Hay algo en tu vida donde todavía no podés ver el resultado pero estás dispuesto a confiar en que es posible?",
"Margarita \"hizo como si creyera\" y Stanley encontró su fe al ver a otros cambiar. ¿Cuál de estas dos formas de llegar a creer te resulta más accesible ahora? ¿Hay alguien cuya transformación te da esperanza?"
],
"practica": "Hacé la oración del padre del muchacho, con tus propias palabras: \"Creo [nombrá algo en lo que podés creer aunque sea un poco]. Ayudá mi incredulidad en [nombrá lo que todavía no podés creer].\" No tiene que ser perfecta. Solo honesta."
},
{
"dia": "Viernes",
"aspecto": "No tenemos que hacerlo solos",
"ensenanza": "Quizá lo más liberador que ofrece el Segundo Paso es esto: sin importar qué queremos y necesitamos que se haga en nuestra vida, no lo tenemos que hacer solos. No tenemos que usar nuestra fuerza de voluntad para cambiarnos a nosotros mismos. Por primera vez, no tenemos que esforzarnos tanto.\n\nPodemos confiar en un Poder Superior.\n\nBeattie lo describe con precisión: existe una lucha interna entre la parte que insiste en que si nos esforzamos más podremos controlar todo, y la parte que sabe que hay un Poder Superior que puede llevarnos a niveles de pensar, sentir y comportarnos más allá de lo que podemos lograr por nosotros mismos.\n\nEl Segundo Paso no nos pide que lo forcemos. Nos pide que nos abramos. Que creemos el espacio. Que dejemos de potencializar el problema y empecemos a potencializar la solución — una que nos es dada.",
"historia": "Beattie describe el momento en que el Segundo Paso le llegó durante su propia recuperación de la codependencia:\n\n\"Estaba en un grupo de recuperación, y a pesar de mi mal humor y desesperación, vi por el rabo del ojo a personas alegres y tranquilas que parecían sanas y felices, aunque habían vivido circunstancias similares o peores que las mías. Una pequeña parte de mí lo registró. Es posible, pensé. Estas personas están manejando la misma situación que enfrento yo, sólo que lo están manejando de manera diferente. A lo mejor eso me puede suceder a mí.\"\n\nNo fue un momento de iluminación dramática. Fue una chispa pequeña, casi imperceptible. Pero fue suficiente.",
"pasajePrincipal": {
"ref": "Isaías 40:29-31",
"texto": "\"El da esfuerzo al cansado, y multiplica las fuerzas al que no tiene ningunas. Los muchachos se fatigan y se cansan, los jóvenes flaquean y caen; pero los que esperan en el Señor tendrán nuevas fuerzas; levantarán alas como las águilas; correrán y no se cansarán; caminarán y no se fatigarán.\""
},
"contextoBiblico": "Isaías escribe a un pueblo en el exilio, agotado, que ha perdido la esperanza. El contexto es de personas que ya dieron todo lo que tenían y no les alcanzó. La promesa no es para los fuertes — es para los que están al límite de sus fuerzas. \"Los muchachos se fatigan\" — incluso los más jóvenes y capaces colapsan. Pero los que esperan en el Señor reciben fuerzas nuevas — no las mismas fuerzas recargadas, sino fuerzas de otra fuente.",
"pasajeApoyo": {
"ref": "2 Corintios 4:7",
"texto": "\"Pero tenemos este tesoro en vasos de barro, para que la excelencia del poder sea de Dios, y no de nosotros.\""
},
"conexion": "Isaías 40 y 2 Corintios 4 describen juntos la paradoja del Segundo Paso: el poder viene precisamente cuando reconocemos que no lo tenemos. Los \"vasos de barro\" que somos no son un problema a resolver — son el diseño. La excelencia del poder es de Dios, no de nosotros. El codependiente agotado que cargó solo durante años encuentra en este Paso algo inesperado: no tenés que seguir cargando solo. Las fuerzas que recibirás cuando sueltes son fuerzas nuevas, de otra fuente.",
"preguntas": [

"ensenanza": "Dar el Tercer Paso es un punto de inicio para nuestra nueva vida. Podemos darlo cuando comenzamos la recuperación. Luego, podemos repetirlo las veces que sea necesario.\n\nEste proceso de rendición tiene lugar no una vez, sino una y otra vez a medida que aprendemos una sucesión de lecciones. Cada vez que pensamos: \"¡Ya está! Ya aprendí. ¡De ahora en adelante todo va a ser fácil!\", nos damos cuenta — con alivio y regocijo — de que volvemos a empezar como principiantes.\n\nY eso no es fracaso. Es el camino. Se presentarán situaciones. Entrarán personas en nuestra vida. Surgirán antiguas formas de pensar — negativas y autodestructivas — y nos serán quitadas y sustituidas por mejores. No recibiremos más de lo que podemos manejar ni menos de lo que necesitamos. El viaje contiene secretos, misterios y regalos más grandes de lo que puedan sostener nuestros brazos y corazones.",
"historia": null,
"pasajePrincipal": {
"ref": "Romanos 8:28",
"texto": "\"Y sabemos que a los que aman a Dios, todas las cosas les ayudan a bien, esto es, a los que conforme a su propósito son llamados.\""
},
"contextoBiblico": "Pablo escribe Romanos 8 desde una perspectiva cósmica: el Espíritu intercede, Dios trabaja en todo, nada puede separarnos de su amor. El versículo 28 no promete que todo lo que pase será bueno — promete que Dios puede trabajar en todo para bien. La palabra griega synergeo significa \"co-trabajar\": Dios trabaja junto con las circunstancias, incluso las dolorosas, para producir bien. No es un optimismo ingenuo — es confianza en la soberanía de un Dios que conoce el cuadro completo.",
"pasajeApoyo": {
"ref": "Jeremías 29:11",
"texto": "\"Porque yo sé los planes que tengo para vosotros, dice el Señor, planes de bienestar y no de calamidad, para daros un futuro y una esperanza.\""
},
"conexion": "Beattie escribe: \"Aun no conocemos el cuadro total; aun no. Sólo vemos una pequeña área de una pintura muy grande.\" Romanos 8:28 y Jeremías 29:11 son la confirmación bíblica de esa realidad: hay un plan más grande que el nuestro, hay un artista que ve el cuadro completo, y ese plan incluye bienestar, futuro y esperanza. Cada rendición nos devuelve a esa verdad. No como resignación sino como confianza activa: me entrego no porque todo esté bien todavía, sino porque creo que está siendo conducido hacia el bien.",
"preguntas": [
"Romanos 8:28 dice que Dios trabaja en todas las cosas para bien — incluso las difíciles. ¿Podés identificar algo difícil que viviste en el pasado del que hoy ves el bien que produjo, aunque en el momento no lo viste? ¿Qué te enseña eso para hoy?",
"Jeremías 29:11 promete planes de bienestar y esperanza. ¿Hay alguna área de tu vida donde te es difícil creer que Dios tiene un plan bueno? ¿Podés nombrarlo y entregárselo en oración hoy?",
"Beattie dice que el Tercer Paso se repite una y otra vez — cada vez que nos estancamos, cada vez que volvemos a controlar. ¿En qué situación concreta de esta semana necesitás darlo de nuevo hoy? ¿Qué necesitás soltar específicamente?"
],
"practica": "Sentate tranquilo y decí en voz alta o escribí: \"Señor, hoy vuelvo a poner mi voluntad y mi vida en tus manos. Suelto [nombrá algo concreto]. Confío en que tenés un plan mejor que el mío. Enséñame lo que necesito aprender.\" Hacelo despacio. Dejá que cada frase aterrice."
}
]

"dias": [
{
"dia": "Lunes",
"aspecto": "El inventario temido — por qué lo evitamos",
"ensenanza": "El Cuarto Paso tiene una reputación. Todo el mundo lo conoce. Muchos lo evitan durante años. Beattie describe la escena con humor y honestidad: llegas a tu junta y descubrís que el tema es el Cuarto Paso. La sala se vacía en treinta minutos. Los que se quedan hablan de todo menos del inventario. \"He pensado en hacer el mío.\" \"Probablemente debería.\" \"Ya va siendo ese momento.\"\n\nJody llevaba seis años en recuperación y todavía no lo había hecho. \"Me aterra. No estoy segura por qué.\"\n\nBeattie se identifica con ella. En los primeros tiempos de su recuperación, este inventario la sobrecogía. No estaba segura de tener una yo misma. No estaba segura de lo que encontraría. Su autoestima era tan baja que dudaba de poder manejar más autocrítica. No sabía dónde empezar. No sabía qué era lo que buscaba.\n\nEso es exactamente lo que hace tan difícil este Paso: no es el trabajo en sí — es el miedo a lo que encontraremos dentro. Y ese miedo, paradójicamente, es la señal de que estamos listos.",
"historia": "\"Antes de hacer mi Cuarto Paso, tenía la imagen de un sótano dentro de una casa\", dijo Carol, que llevaba diez años en Al-Anon. \"El sótano estaba oscuro. Había ventanas, pero estaban opacadas con tizne y cubiertas por arbustos. Era un tiradero. Todo amontonado. Sucio. No entraba nada de luz. Me asustaba. Ese cuarto en la casa — mi casa — era aterrador. No lo quería ver. No quería entrar en él. Sin embargo, siempre estaba consciente de su existencia.\"\n\n\"Ahora he hecho varios Cuartos Pasos\", dijo Carol. \"Con cada uno el sótano se tornaba un poco más ordenado y organizado. Más limpio. Ahora cuando contemplo el sótano en esa casa, es un cuarto agradable. Está redecorado y más habitable. Las ventanas están limpias y pulidas, son grandes y están abiertas, y el cuarto se llena de una luz dorada.\"\n\n\"Ya no le tengo miedo a esa parte de mi casa. Me resulta cómodo entrar y mirar alrededor cuando así lo deseo.\"\n\n\"Esa casa soy yo.\"",
"pasajePrincipal": {
"ref": "Salmo 139:23-24",
"texto": "\"Examíname, oh Dios, y conoce mi corazón; pruébame y conoce mis pensamientos. Ve si hay en mí camino de perversidad, y guíame en el camino eterno.\""
},
"contextoBiblico": "David escribe este salmo como una meditación sobre el conocimiento total que Dios tiene de él — sus pensamientos, sus palabras, sus caminos. Lo interesante es que David no pide ser examinado desde el miedo sino desde la confianza: sabe que Dios ya lo conoce completamente. El \"examiname\" del versículo 23 no es una invitación a la condena sino a la claridad. David quiere ver lo que Dios ya ve — no para destruirse, sino para ser guiado. La petición termina con dirección, no con juicio: \"guíame en el camino eterno.\"",
"pasajeApoyo": {
"ref": "Lamentaciones 3:40",
"texto": "\"Escudriñemos nuestros caminos y busquemos, y volvámonos al Señor.\""
},
"conexion": "El sótano de Carol es la imagen perfecta del Cuarto Paso visto desde la fe: un lugar que siempre supimos que existía, que nos daba miedo, y que cuando finalmente entramos — con luz — resultó ser transformable. El Salmo 139 nos dice que Dios ya está en ese sótano. No entramos solos. Y Lamentaciones 3:40 — escrito desde el dolor más profundo del pueblo hebreo — nos recuerda que escudriñar los propios caminos y volverse al Señor van de la mano. El inventario no es un ejercicio de autocrítica: es un acto de regreso.",
"preguntas": [
"El Salmo 139:23 pide a Dios \"examíname\" — no como condena sino como guía. ¿Podés hacer esa misma oración hoy con honestidad? ¿Qué parte de vos sentís que Dios podría querer mostrarte, y que vos has estado evitando ver?",
"Carol describió su sótano interior como oscuro, desordenado y aterrador — pero siempre consciente de su existencia. ¿Cómo describirías el tuyo? ¿Qué hay ahí adentro que sabés que existe pero no has querido mirar?",
"Lamentaciones 3:40 dice \"escudriñemos nuestros caminos y busquemos, y volvámonos al Señor.\" ¿Qué te ha impedido hasta ahora hacer este tipo de mirada interna? ¿Es el miedo a lo que encontrarás, el no saber cómo empezar, o algo más?"
],
"practica": "Escribí en un papel la imagen que tenés de tu \"sótano interior\": ¿cómo lo ves? ¿Qué hay ahí? ¿Está ordenado o revuelto? ¿Hay luz o está oscuro? No es para analizarlo todavía — solo para hacer visible lo que sabés que existe."
},
{
"dia": "Martes",
"aspecto": "De mirar afuera a mirar adentro",
"ensenanza": "Muchos comenzamos nuestra recuperación mirando alrededor y afuera de nosotros mismos. Nos enojamos, nos quejamos, manipulamos, intentamos controlar, y apuntamos el dedo hacia la otra persona insistiendo que él o ella está haciendo algo que no nos gusta. Esto es lo que Beattie llama mirar \"hacia afuera\".\n\nMirar el comportamiento ajeno a veces está justificado. Pero cuando nos cansamos de gastar energía repasando los detalles de la otra persona, enfrentamos las preguntas del Cuarto Paso: ¿Qué sucede conmigo? ¿Qué estoy haciendo? ¿Qué estoy dejando de hacer? ¿Qué despiertan en mí estas circunstancias? ¿Cuál es mi lección en esta experiencia?\n\nEl gran engaño de la codependencia es este: nos sentiríamos diferente si el otro cambiara, si estuviéramos en otro lugar, si tuviéramos todo lo que deseamos. No es cierto. Podríamos volar a cien destinos distintos y hasta que enfrentamos nuestros propios sentimientos, los encontraremos en cada lugar. Nuestro verdadero poder reside en vernos a nosotros mismos honestamente.",
"historia": "\"Antes de entrar en un programa de Doce Pasos, me protegía de las emociones negativas y miedos\", dijo Kathy. \"Vivía a través de las vidas de otros. Siempre estaba más preocupada por los demás que por mí misma. No solía mirar hacia adentro. No me tomaba en cuenta. Me sentía vacía, descolorida, y superficial.\"\n\n\"Cómo me sentía era parecido a cómo llevaba mi casa. La casa estaba limpia, pero si abrías un armario te engullía. O si movías un sofá, te rodeaban las malas hierbas.\"\n\nLa imagen es exacta: por fuera, todo en orden. Por dentro, los armarios llenos de cosas que no queremos ver.",
"pasajePrincipal": {
"ref": "Mateo 7:3-5",
"texto": "\"¿Y por qué miras la paja que está en el ojo de tu hermano, y no echas de ver la viga que está en tu propio ojo? ¿O cómo dirás a tu hermano: Déjame sacar la paja de tu ojo, cuando tienes la viga en el tuyo propio? ¡Hipócrita! Saca primero la viga de tu propio ojo, y entonces verás bien para sacar la paja del ojo de tu hermano.\""
},
"contextoBiblico": "Jesús dice estas palabras en el Sermón del Monte, en un contexto de enseñanza sobre el juicio. La imagen es hiperbólica e intencional: una viga en el ojo es imposible, ridícula. Jesús usa la exageración para señalar algo serio: hay una asimetría entre lo que vemos en otros y lo que vemos en nosotros mismos. No está diciendo que el otro no tiene problemas — la paja existe. Está diciendo que la visión clara de afuera solo es posible después de la visión clara de adentro.",
"pasajeApoyo": {
"ref": "2 Corintios 13:5",
"texto": "\"Examinaos a vosotros mismos si estáis en la fe; probaos a vosotros mismos.\""
},
"conexion": "Mateo 7 es el texto bíblico del Cuarto Paso. No dice que el otro no tiene problemas. Dice que la claridad sobre el otro viene después de la claridad sobre uno mismo. El Cuarto Paso no nos pide ignorar lo que otros hacen — nos pide mirar primero lo que hacemos nosotros. Kathy sabía exactamente lo que había en los armarios de los demás. Lo que no quería ver era lo que había en los suyos. El paso no es negar lo de afuera — es comenzar desde adentro.",
"preguntas": [
"Mateo 7:3-5 habla de ver claramente la paja en el ojo ajeno pero no la viga en el propio. ¿En qué relación o situación de tu vida tenés el foco puesto principalmente en lo que el otro hace mal? ¿Qué podría estar pasando adentro tuyo en esa misma situación que todavía no has mirado?",
"Kathy describió su casa como limpia por fuera pero con armarios que te engullían. ¿Cómo es tu \"casa interna\"? ¿Qué aspectos de vos mismo tenés bien presentados hacia afuera pero no has revisado por dentro?",
"2 Corintios 13:5 dice \"examinaos a vosotros mismos.\" ¿Cuándo fue la última vez que te tomaste tiempo para hacer ese examen honesto — no sobre lo que otros hacen, sino sobre lo que vos hacés, sentís, creés y necesitás?"
],
"practica": "Elegí una situación o relación que te genere malestar. Escribí primero lo que el otro hace que te molesta. Luego, escribí una segunda parte: \"¿Y qué pasa conmigo en esta situación?\" Escribí al menos cinco líneas sobre vos mismo. Ese segundo párrafo es el Cuarto Paso."
},
{
"dia": "Miércoles",
"aspecto": "Sentimientos, resentimientos y miedos",
"ensenanza": "¿Qué buscamos en el inventario? Buscamos lo que está bien con nosotros y nuestros valores. Buscamos nuestros errores también. Buscamos enojo, temor, dolor, ira y resentimiento. Buscamos situaciones de victimización: las maneras en que otros nos han victimizado, y también las formas en que nos hemos victimizado a nosotros mismos.\n\nBuscamos recuerdos dolorosos que hemos reprimido. Localizamos nuestros temores y las creencias que nos limitan, los mensajes que son falsos y que pueden estar determinando nuestra vida.\n\nPero hay algo crucial que dice Beattie: nuestros sentimientos son nuestra responsabilidad. No importa quién hizo qué. Nuestro sentir es nuestro sentir. Estará con nosotros hasta que lo enfrentemos, sin importar si la otra persona cambia o no. Los sentimientos no resueltos del pasado no desaparecen — se repiten hasta que estemos dispuestos a enfrentarlos.",
"historia": "\"Los asuntos grandes en mi inventario de codependencia fueron la manipulación y el control\", dijo Kevin. \"Pensar que podía controlar a otras personas y tratando de controlar los sentimientos de otros para sentirme seguro. Trataba de mantenerme un paso adelante de todos. Tenía miedo que las personas se enojaran conmigo o salieran de control. Decía que me gustaba la espontaneidad, pero me daba miedo. Pasaba mucho tiempo preocupado de lo que otros pensaban de mí, y pensaba que podía controlar eso. Estaba fijado en los demás.\"\n\nKevin lo descubrió al hacer el inventario: debajo del control había miedo. Debajo del miedo había una necesidad de seguridad que nunca se resolvió. El inventario no lo culpó — lo explicó.",
"pasajePrincipal": {
"ref": "Efesios 4:26-27",
"texto": "\"Airaos, pero no pequéis; no se ponga el sol sobre vuestro enojo, ni deis lugar al diablo.\""
},
"contextoBiblico": "Pablo cita aquí el Salmo 4:4 y lo aplica a la vida comunitaria de la iglesia de Éfeso. Lo notable del versículo es que no dice \"no os airéis\" — dice \"airaos, pero no pequéis.\" El enojo en sí no es el problema: es una emoción legítima. El problema es guardar ese enojo, acumularlo, darle espacio hasta que se convierta en resentimiento que nos controla. La frase \"no deis lugar al diablo\" implica que el enojo no procesado abre puertas que deberían estar cerradas.",
"pasajeApoyo": {
"ref": "Salmo 32:3-4",
"texto": "\"Mientras callé, se envejecieron mis huesos en mi gemir todo el día. Porque de día y de noche se agravó sobre mí tu mano; se volvió mi verdor en sequedades de verano.\""
},
"conexion": "Efesios 4:26 nos da permiso para sentir el enojo — y nos advierte sobre guardarlo. El Salmo 32:3-4 describe lo que le pasa al cuerpo cuando callamos lo que sentimos: los huesos envejecen, la vitalidad se convierte en sequía. Kevin descubrió que su control venía del miedo — y ese miedo había estado gobernando su vida sin nombre. El Cuarto Paso le puso nombre. No para culpar a otros ni a sí mismo, sino para ver la raíz: cuando nombramos lo que sentimos, dejamos de ser gobernados por ello.",
"preguntas": [
"Efesios 4:26 dice que podés airarte, pero no guardar ese enojo. ¿Con quién o con qué situación estás enojado desde hace tiempo que no has procesado? ¿Qué pasaría si lo escribieras sin filtro, solo para sacarlo?",
"El Salmo 32 describe el costo físico de callar los propios sentimientos. ¿Hay alguna emoción — enojo, tristeza, miedo, vergüenza — que llevás reprimida hace tiempo? ¿Dónde la sentís en el cuerpo?",
"Kevin descubrió que debajo de su control había miedo. ¿Qué hay debajo de tus comportamientos más recurrentes? Si el control, el sobre-cuidado o el aislamiento son síntomas, ¿cuál es el miedo o el dolor que los produce?"
],
"practica": "Hacé una lista simple hoy: cinco resentimientos (personas o situaciones con las que estás enojado), cinco miedos actuales. Al lado de cada uno, escribí una palabra que describa qué emoción esconde: ¿vergüenza, rechazo, abandono, inseguridad? Solo nombrar ya es hacer el inventario."
},
{
"dia": "Jueves",
"aspecto": "Los mensajes del pasado que gobiernan el presente",
"ensenanza": "Buscamos mensajes de nuestro pasado que pueden estar controlando nuestra vida actual. Mensajes genéricos de la codependencia que muchos hemos recibido: \"No sientas\"; \"No pienses\"; \"No seas quien eres\"; \"No te trates bien\"; \"Sé perfecto\"; \"No te diviertas\"; \"Cuida a otros y no te cuides a ti mismo.\"\n\nY mensajes más personales: \"No soy digno de ser amado\"; \"Las personas no son de confiar\"; \"Soy tonto\"; \"No merezco triunfar\"; \"Las personas siempre me rechazan\"; \"Estoy mejor solo.\"\n\nEstos mensajes pueden constituir fuerzas poderosas en nuestra vida. Si creemos que somos tontos, ese mensaje puede apoderarse de nuestra vida entera. Si nos creemos indignos de ser amados, esa creencia puede afectar la calidad de todas nuestras relaciones, incluyendo la más importante: la relación con nosotros mismos. El poder del mensaje \"no sentir\" es obvio: si no está bien sentir, pasamos la mayor parte del día resistiéndonos y reprimiendo nuestros sentimientos.\n\nSentir nuestras emociones, permitirnos tener sentimientos, es una de las llaves de la recuperación.",
"historia": "\"Los Doce Pasos son afirmaciones para recordarme que tengo sentimientos\", dice Tim. \"Los Pasos son un recordatorio para prestar más atención a mis sentimientos o de dejarlos ser y no olvidar o ignorarlos.\"\n\nTim aprendió desde niño — de sus padres disfuncionales que representaban a Dios de manera torcida — que sus sentimientos no eran bienvenidos. El mensaje fue tan profundo que necesitaba que los Pasos le recordaran, semana tras semana, que tenía derecho a sentir.\n\nLo mismo describió Beattie de sí misma: había negado y se había cegado a sus sentimientos durante tanto tiempo que vivía igualmente en la ilusión que en el engaño. Sacó de adentro, página tras página, un torrente de miedos y creencias negativas que ni sabía que estaban.",
"pasajePrincipal": {
"ref": "Romanos 12:2",
"texto": "\"No os conforméis a este siglo, sino transformaos por medio de la renovación de vuestro entendimiento, para que comprobéis cuál es la buena voluntad de Dios, agradable y perfecta.\""
},
"contextoBiblico": "La palabra \"transformaos\" en griego es metamorphoo — de donde viene metamorfosis. No es un ajuste superficial sino una transformación desde adentro. Y el mecanismo es la renovación del entendimiento — literalmente, de la mente, de los patrones de pensamiento. Pablo escribe esto a personas que vienen de contextos con mensajes profundamente formados por su cultura. La renovación no es automática: requiere un proceso activo de identificar los viejos patrones y reemplazarlos con la verdad de Dios.",
"pasajeApoyo": {
"ref": "Juan 8:32",
"texto": "\"Y conoceréis la verdad, y la verdad os hará libres.\""
},
"conexion": "Los mensajes que Beattie describe — \"no sientas\", \"no seas quien eres\", \"soy indigno de amor\" — son exactamente los patrones de pensamiento que Romanos 12:2 llama a renovar. No podemos renovar lo que no vemos. El Cuarto Paso hace visible lo invisible: saca a la luz los mensajes que han estado gobernando nuestra vida en la oscuridad. Juan 8:32 completa el círculo: la verdad que conocemos — la verdad sobre quiénes somos, sobre lo que realmente sentimos, sobre los mensajes que recibimos — es la que nos hace libres. Pero primero hay que conocerla.",
"preguntas": [
"Romanos 12:2 habla de la renovación del entendimiento — cambiar los patrones de pensamiento. ¿Cuáles son los mensajes más arraigados que tienes sobre vos mismo? (\"Soy demasiado\", \"No soy suficiente\", \"Debo ganarme el amor\") ¿De dónde vienen esos mensajes?",
"Juan 8:32 dice que la verdad os hará libres. ¿Cuál es la mentira sobre vos mismo que más te ha limitado — en tus relaciones, en tu trabajo, en tu relación con Dios? ¿Podés nombrarla hoy?",
"Tim necesitaba que los Pasos le recordaran que tenía sentimientos. ¿Qué sentimientos tenés dificultad para reconocer o expresar? ¿Cuándo aprendiste que esos sentimientos no eran bienvenidos o seguros?"
],
"practica": "Completá en tu diario estas frases: \"El mensaje que más recibí sobre quién soy es...\" / \"La verdad de Dios sobre quién soy es...\" / \"El sentimiento que más he reprimido es...\" / \"Me permito sentirlo porque...\" No buscás respuestas perfectas — buscás honestidad."
},
{
"dia": "Viernes",
"aspecto": "Culpa vs. vergüenza — aprender a amarnos",
"ensenanza": "El Cuarto Paso nos ayuda a cambiar de un sistema con base en la vergüenza a un sistema de amor y aceptación propios. Y para eso necesitamos entender la diferencia entre dos cosas que muchos confundimos.\n\nLa culpa legítima significa que nos sentimos mal acerca de algo que hemos hecho. Si nos sentimos mal acerca de algo que hemos hecho, podemos remediarlo y acabar con la culpa. Hay una solución.\n\nLa vergüenza significa que nos sentimos mal acerca de quienes somos. Cambiar nuestro comportamiento no acaba con la vergüenza. La vergüenza nos deja con un sentimiento de que todo lo que podemos hacer es disculparnos por existir.\n\nAdemás, maltratarnos a nosotros mismos es un asunto moral, al igual que maltratar a otros. Creer que no somos merecedores de amor, que somos indignos, insuficientemente buenos — eso también está en el inventario. No poner límites, permitir que nos dañen o lastimen, es un asunto moral. Abandonarnos a nosotros mismos es un asunto moral.\n\nCometemos errores. No somos errores.",
"historia": "Beattie describe el descubrimiento que más le costó hacer:\n\n\"Adentro tenía tristeza, tanta tristeza y soledad y dolor. Tenía tantas paredes alrededor de mi corazón que no podía tolerar recibir el amor.\"\n\n\"Los sentimientos de rechazo y tristeza se acompañaban de la creencia de no ser, ahora ni nunca, suficientemente buena. Y lo escondía todo detrás de una extraña ambivalencia dentro de la cual vacilaba entre sentimientos de superioridad y de inferioridad.\"\n\n\"El dolor más fuerte no vino de estas experiencias, sino de mi reacción a estas experiencias: negación y autorrechazo. Aprendí a aceptar tan poco de la vida, porque creí que merecía tan poco.\"\n\nEsa fue la raíz: no lo que le hicieron, sino lo que ella creyó sobre sí misma como resultado de lo que le hicieron.",
"pasajePrincipal": {
"ref": "Romanos 8:1-2",
"texto": "\"Ahora, pues, ninguna condenación hay para los que están en Cristo Jesús. Porque la ley del Espíritu de vida en Cristo Jesús me ha librado de la ley del pecado y de la muerte.\""
},
"contextoBiblico": "Romanos 8:1 es uno de los versículos más liberadores del Nuevo Testamento, y llega inmediatamente después de Romanos 7 — el capítulo donde Pablo describe el ciclo de hacer lo que no quiere y no hacer lo que quiere. Después de esa honestidad brutal, Pablo declara: ninguna condenación. No para quienes lo hacen perfecto — para quienes están en Cristo. La ausencia de condenación no es permisividad: es el suelo desde el cual puede haber cambio real. El sistema de la vergüenza produce más vergüenza; el sistema de la gracia produce transformación.",
"pasajeApoyo": {
"ref": "1 Juan 3:20",
"texto": "\"Porque si nuestro corazón nos condena, mayor que nuestro corazón es Dios, y él sabe todas las cosas.\""
},
"conexion": "Beattie describe el sistema de la vergüenza desde adentro: creer que no sos suficientemente buena, que merecés poco, que debés disculparte por existir. Romanos 8:1 es la respuesta directa: ninguna condenación. Y 1 Juan 3:20 añade algo poderoso: cuando tu propio corazón te condena, Dios es más grande que tu corazón. La voz de la vergüenza no es la voz de Dios. El Cuarto Paso nos ayuda a distinguir entre ambas — y a elegir, poco a poco, creerle a Dios más que a la vergüenza.",
"preguntas": [
"Romanos 8:1 dice \"ninguna condenación hay para los que están en Cristo Jesús.\" ¿Podés recibir esa declaración para vos mismo hoy? ¿Qué parte de vos la rechaza o no puede creerla? ¿Qué tendría que cambiar en tu forma de verte para recibirla?",
"Beattie distingue entre culpa (hice algo malo) y vergüenza (soy algo malo). ¿De cuál de las dos vivís principalmente? ¿Podés identificar algo concreto que cargás como vergüenza y que en realidad es solo culpa — algo que podés remediar?",
"1 Juan 3:20 dice que Dios es mayor que tu corazón cuando este te condena. ¿Cuál es la voz interna más cruel que tenés hacia vos mismo? ¿Qué diría Dios sobre esa misma situación, según lo que conocés de Él?"
],
"practica": "Escribí una lista de cosas por las que te sentís culpable o avergonzado. Para cada una, identificá: ¿es culpa (algo que hice) o vergüenza (algo que creo que soy)? Las de culpa: ¿hay algo que podés hacer? Las de vergüenza: escribí al lado lo que Romanos 8:1 dice sobre eso."
},
{
"dia": "Sábado",
"aspecto": "Abrir el corazón al amor",
"ensenanza": "Este es el Paso de sanar el corazón. Beattie lo describe así: trabajamos estos Pasos para curarnos del dolor, el miedo, la culpa y las creencias que nos limitan. Pero para hacer eso, primero debemos reconocerlos. Esa es la tarea del Cuarto Paso.\n\nAquellos que encuentran el valor para mirar hacia adentro son los que se sienten más cómodos consigo mismos y con la recuperación. Este Paso puede cambiar vidas. Lo que nos ha sucedido puede ser tenebroso, pero nuestro núcleo es hermoso y bueno.\n\nY hay una última cosa que dice Beattie al final de su propio proceso — después de meses de duelo, de ira, de descubrimiento — que lo resume todo: al final, me di cuenta de que me faltaba perdonar a una persona. Me llevó el mayor esfuerzo y tiempo perdonar y aceptar a esa persona. Esa persona era yo.",
"historia": "Beattie describe la noche en que algo rompió:\n\n\"Una noche, en la soledad de mi propia casa, tuve una experiencia espiritual. Sucedió en mi corazón. Como una ola gigante, me inundó el entendimiento de que tenía que perdonar todo, a cada persona de mi pasado.\"\n\n\"Pasó de mi mente a mi corazón, y un pensamiento amoroso y perdonador acompañó a cada nombre. El perdón fue un regalo. Sólo tenía que poner mi buena voluntad.\"\n\n\"A medida que cada nombre, cada persona, y un pensamiento de perdón para cada uno pasaba por mi corazón, sentí cómo se iba aligerando y aligerando mi corazón. Se rompían las grandes bandas de restricción alrededor de mi pecho, y una parte mía que había estado cerrada, se abrió. Esa parte era mi corazón.\"\n\n\"Por primera vez en mi vida, experimento el amor incondicional. Lo recibo de otros. Lo siento para otros. Es tan diferente de cómo amaba en el pasado. A veces me siento como el Hombre de Hojalata de El Mago de Oz. Por fin tengo un corazón.\"",
"pasajePrincipal": {
"ref": "Ezequiel 36:26",
"texto": "\"Os daré corazón nuevo, y pondré espíritu nuevo dentro de vosotros; y quitaré de vuestra carne el corazón de piedra, y os daré un corazón de carne.\""
},
"contextoBiblico": "Esta promesa llega en uno de los momentos más oscuros de la historia de Israel: el exilio en Babilonia. El pueblo está lejos, derrotado, con un corazón endurecido por años de sufrimiento y resistencia. La promesa de Dios no es que los circunstancias mejorarán de golpe — es que Él va a cambiar algo más profundo: el corazón mismo. El \"corazón de piedra\" es exactamente el corazón protegido, cerrado, rodeado de muros. El \"corazón de carne\" es el que puede sentir, recibir y dar.",
"pasajeApoyo": {
"ref": "1 Juan 4:18",
"texto": "\"En el amor no hay temor, sino que el perfecto amor echa fuera el temor; porque el temor lleva en sí castigo. De donde el que teme, no ha sido perfeccionado en el amor.\""
},
"conexion": "Beattie describe el proceso como quitar las paredes de acero alrededor de su corazón, las \"varillas\" y \"bandas de restricción\" que lo mantenían cerrado. Ezequiel 36:26 es la promesa bíblica de exactamente eso: Dios quita el corazón de piedra y da uno de carne. No como acto mágico sino como proceso que requiere nuestra buena voluntad — igual que Beattie. Y 1 Juan 4:18 describe el resultado: cuando el amor perfecto de Dios entra, el miedo — el que mantenía las paredes levantadas — empieza a ceder. No de golpe. En olas. Como ella describe.",
"preguntas": [
"Ezequiel 36:26 promete quitar el corazón de piedra y dar uno de carne. ¿En qué área de tu vida sentís que tu corazón está más endurecido o cerrado? ¿Qué lo endureció? ¿Podés pedirle a Dios que ablande específicamente esa área?",
"Beattie describe que la persona que más le costó perdonar fue ella misma. ¿Hay algo en vos mismo que todavía no has podido perdonarte? ¿Qué necesitarías para empezar ese proceso?",
"1 Juan 4:18 dice que el perfecto amor echa fuera el temor. ¿Qué miedos han mantenido cerrado tu corazón — miedo a ser conocido, a ser rechazado, a no ser suficiente? ¿Podés identificar uno y entregárselo a Dios hoy?"
],
"practica": "Escribí una carta breve a vos mismo, desde la perspectiva de Dios viéndote. No la que crees merecer — la que Romanos 8:1 y Ezequiel 36:26 describen. Empezá: \"Querido/a [tu nombre], te veo y...\" Dejá que las palabras salgan sin censura. Guardala."
}
]

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const SEMANAS = JSON.parse(document.getElementById("app-data").textContent);
const TOTAL = 72;
const COOKIE = "guia_biblica_v3";

function getCookie() {
  try {
    const m = document.cookie.split("; ").find(r => r.startsWith(COOKIE + "="));
    return m ? JSON.parse(decodeURIComponent(m.split("=")[1])) : {};
  } catch { return {}; }
}
function saveCookie(data) {
  const exp = new Date(); exp.setFullYear(exp.getFullYear() + 2);
  document.cookie = `${COOKIE}=${encodeURIComponent(JSON.stringify(data))}; expires=${exp.toUTCString()}; path=/`;
}

// ─── PLACEHOLDER DAY ─────────────────────────────────────────────────────────
function PlaceholderDay({ d, i, sem, done, toggle, expanded, setExpanded }) {
  const k = `${sem.numero}-${i}`;
  const isDone = !!done[k];
  const isExp = expanded === i;
  return (
    <div className="day-card" style={{background:isDone?`${sem.color}0e`:"#13161f",border:`1px solid ${isDone?sem.color+"40":"#1e2130"}`,borderRadius:10,overflow:"hidden"}}>
      <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 18px",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:i)}>
        <div className="check-circle" onClick={e=>{e.stopPropagation();toggle(sem.numero,i);}}
          style={{width:34,height:34,borderRadius:"50%",background:isDone?sem.color:"transparent",border:`2px solid ${isDone?sem.color:"#2a2d3a"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {isDone&&<svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8L6.5 11.5L13 5" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:2,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:11,fontWeight:700,color:sem.color,letterSpacing:1}}>{d.dia.toUpperCase()}</span>
            <span style={{color:"#333"}}>·</span>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:isDone?"#b8a87a":"#999"}}>{d.aspecto}</span>
          </div>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#555"}}>{d.versiculo}</div>
        </div>
        <svg className="expand-arrow" style={{transform:isExp?"rotate(180deg)":"rotate(0deg)",flexShrink:0}} width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6L8 10L12 6" stroke="#444" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      {isExp&&(
        <div style={{padding:"0 18px 18px"}}>
          <div style={{background:"#0a0c12",borderLeft:`3px solid ${sem.color}`,borderRadius:"0 8px 8px 0",padding:"12px 14px",marginBottom:10}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:5}}>{d.versiculo.toUpperCase()}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:"#c0b090",lineHeight:1.75,fontStyle:"italic"}}>{d.texto}</div>
          </div>
          <div style={{background:"#0f1117",border:"1px solid #1a1d26",borderRadius:8,padding:"12px 14px",marginBottom:12}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#666",fontWeight:700,letterSpacing:2,marginBottom:5}}>✦ REFLEXIÓN</div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#aaa",lineHeight:1.8}}>{d.reflexion}</div>
          </div>
          <button className="action-btn" onClick={()=>toggle(sem.numero,i)}
            style={{width:"100%",padding:"10px",borderRadius:8,border:`1px solid ${isDone?sem.color:"#2a2d3a"}`,background:isDone?`${sem.color}20`:"transparent",color:isDone?sem.color:"#777",fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:700,letterSpacing:1}}>
            {isDone?"✓  COMPLETADO — clic para desmarcar":"MARCAR COMO COMPLETADO"}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── FULL DAY ─────────────────────────────────────────────────────────────────
function FullDay({ d, i, sem, done, toggle, expanded, setExpanded }) {
  const k = `${sem.numero}-${i}`;
  const isDone = !!done[k];
  const isExp = expanded === i;

  return (

      <div style={{display:"flex",alignItems:"center",gap:14,padding:"16px 20px",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:i)}>
        <div className="check-circle" onClick={e=>{e.stopPropagation();toggle(sem.numero,i);}}
          style={{width:36,height:36,borderRadius:"50%",background:isDone?sem.color:"transparent",border:`2px solid ${isDone?sem.color:"#2a2d3a"}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          {isDone&&<svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8L6.5 11.5L13 5" stroke="white" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"baseline",gap:6,marginBottom:3,flexWrap:"wrap"}}>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:11,fontWeight:700,color:sem.color,letterSpacing:1}}>{d.dia.toUpperCase()}</span>
            <span style={{color:"#333"}}>·</span>
            <span style={{fontFamily:"'Lato',sans-serif",fontSize:14,color:isDone?"#c8b880":"#bbb",fontWeight:isDone?700:400}}>{d.aspecto}</span>
          </div>
          <div style={{fontFamily:"'Lato',sans-serif",fontSize:11,color:"#555"}}>{d.pasajePrincipal.ref} · {d.pasajeApoyo.ref}</div>
        </div>
        <svg className="expand-arrow" style={{transform:isExp?"rotate(180deg)":"rotate(0deg)",flexShrink:0}} width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M4 6L8 10L12 6" stroke="#444" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>

      {isExp&&(
        <div style={{padding:"0 20px 22px"}}>

          {/* Enseñanza */}
          <div style={{marginBottom:16}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:10}}>ENSEÑANZA DEL DÍA</div>
            {d.ensenanza.split("\n\n").map((p,idx)=>(
              <p key={idx} style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#b0a898",lineHeight:1.85,marginBottom:10}}>{p}</p>
            ))}
          </div>

          {/* Historia */}
          {d.historia&&(
            <div style={{background:"#0d1018",border:`1px solid ${sem.color}25`,borderRadius:10,padding:"14px 16px",marginBottom:16}}>
              <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:10}}>
                <span style={{color:sem.color,fontSize:13}}>❝</span>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2}}>HISTORIA DEL DÍA</div>
              </div>
              {d.historia.split("\n\n").map((p,idx)=>(
                <p key={idx} style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#9a9080",lineHeight:1.85,marginBottom:8,fontStyle:"italic"}}>{p}</p>
              ))}
            </div>
          )}

          {/* Estudio Bíblico */}
          <div style={{background:"#0a0c12",border:`1px solid ${sem.color}30`,borderRadius:10,padding:"16px",marginBottom:16}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:14}}>📖 ESTUDIO BÍBLICO DEL DÍA</div>

            {/* Pasaje principal */}
            <div style={{borderLeft:`3px solid ${sem.color}`,paddingLeft:14,marginBottom:14}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:6}}>PASAJE PRINCIPAL · {d.pasajePrincipal.ref.toUpperCase()}</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#d4c090",lineHeight:1.8,fontStyle:"italic"}}>{d.pasajePrincipal.texto}</div>
            </div>

            {/* Contexto */}
            <div style={{background:"#0f1117",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#666",fontWeight:700,letterSpacing:2,marginBottom:6}}>CONTEXTO BÍBLICO</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#8a8070",lineHeight:1.8}}>{d.contextoBiblico}</div>
            </div>

            {/* Pasaje apoyo */}
            <div style={{borderLeft:`2px solid ${sem.color}66`,paddingLeft:14,marginBottom:14}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#777",fontWeight:700,letterSpacing:2,marginBottom:6}}>PASAJE DE APOYO · {d.pasajeApoyo.ref.toUpperCase()}</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:14,color:"#b8a880",lineHeight:1.8,fontStyle:"italic"}}>{d.pasajeApoyo.texto}</div>
            </div>

            {/* Conexión */}
            <div style={{borderTop:`1px solid ${sem.color}20`,paddingTop:12}}>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:6}}>CONEXIÓN CON EL PASO</div>
              <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#a09888",lineHeight:1.85}}>{d.conexion}</div>
            </div>
          </div>

          {/* Preguntas */}
          <div style={{background:"#0f1117",border:"1px solid #1a1d26",borderRadius:10,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#888",fontWeight:700,letterSpacing:2,marginBottom:12}}>✦ PREGUNTAS DE REFLEXIÓN</div>
            {d.preguntas.map((q,qi)=>(
              <div key={qi} style={{borderLeft:`2px solid ${sem.color}50`,paddingLeft:12,marginBottom:qi<2?12:0}}>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:sem.color,fontWeight:700,marginBottom:4}}>{qi+1}.</div>
                <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#b0a898",lineHeight:1.8}}>{q}</div>
              </div>
            ))}
          </div>

          {/* Práctica */}
          <div style={{background:`${sem.color}0c`,border:`1px solid ${sem.color}30`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:sem.color,fontWeight:700,letterSpacing:2,marginBottom:6}}>✎ PRÁCTICA CONCRETA</div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#c0b080",lineHeight:1.8}}>{d.practica}</div>
          </div>

          <button className="action-btn" onClick={()=>toggle(sem.numero,i)}
            style={{width:"100%",padding:"11px",borderRadius:8,border:`1px solid ${isDone?sem.color:"#2a2d3a"}`,background:isDone?`${sem.color}22`:"transparent",color:isDone?sem.color:"#777",fontFamily:"'Lato',sans-serif",fontSize:12,fontWeight:700,letterSpacing:1}}>
            {isDone?"✓  COMPLETADO — clic para desmarcar":"MARCAR COMO COMPLETADO"}
          </button>
        </div>
      )}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App() {
  const [semanaIdx, setSemanaIdx] = useState(0);
  const [done, setDone] = useState({});
  const [expanded, setExpanded] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(false);

  useEffect(()=>{setDone(getCookie());},[]);

  const toggle = useCallback((s,d)=>{
    const k=`${s}-${d}`;
    setDone(prev=>{
      const next={...prev};
      next[k]?delete next[k]:(next[k]=1);
      saveCookie(next);
      return next;
    });
  },[]);

  const totalDone = Object.keys(done).length;
  const pct = Math.round((totalDone/TOTAL)*100);
  const sem = SEMANAS[semanaIdx];
  const semDone = sem.dias.filter((_,i)=>done[`${sem.numero}-${i}`]).length;
  const reset = ()=>{ if(confirm("¿Reiniciar todo el progreso?")){setDone({});saveCookie({});} };

  return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",background:"#0f1117"}}>

      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#1a1d26,#12151e)",borderBottom:"1px solid #1e2130",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,gap:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
          <button className="menu-toggle" onClick={()=>setSidebarOpen(true)}
            style={{background:"transparent",border:"1px solid #2a2d3a",borderRadius:6,width:34,height:34,alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0,flexDirection:"column",gap:3}}>
            <span style={{display:"block",width:14,height:1.5,background:"#888",borderRadius:1}}/>
            <span style={{display:"block",width:14,height:1.5,background:"#888",borderRadius:1}}/>
            <span style={{display:"block",width:14,height:1.5,background:"#888",borderRadius:1}}/>
          </button>
          <span style={{color:"#c49a00",fontSize:20}}>✦</span>
          <div style={{minWidth:0}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:"#e8e0d0"}}>Guía Bíblica</div>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#555",letterSpacing:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>12 PASOS · LIBERTAD DE LA CODEPENDENCIA</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{textAlign:"right"}}>
            <div className="progress-label" style={{fontFamily:"'Lato',sans-serif",fontSize:10,color:"#555",marginBottom:4}}>PROGRESO TOTAL</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div className="progress-bar-header" style={{width:90,height:5,background:"#1e2130",borderRadius:3,overflow:"hidden"}}>
                <div style={{width:`${pct}%`,height:"100%",background:"linear-gradient(90deg,#c49a00,#e8c547)",borderRadius:3,transition:"width 0.4s"}}/>
              </div>
              <span style={{fontFamily:"'Lato',sans-serif",fontSize:13,color:"#c49a00",fontWeight:700}}>{pct}%</span>
            </div>
          </div>
          <button onClick={reset} style={{background:"transparent",border:"1px solid #2a2d3a",borderRadius:6,padding:"4px 10px",color:"#555",cursor:"pointer",fontSize:11,fontFamily:"'Lato',sans-serif"}}>↺</button>
        </div>
      </div>

      <div className="layout" style={{display:"flex",flex:1}}>

        {/* BACKDROP (mobile) */}
        <div className={`sidebar-backdrop ${sidebarOpen?"open":""}`} onClick={()=>setSidebarOpen(false)}></div>

        {/* SIDEBAR */}
        <div className={`sidebar ${sidebarOpen?"open":""}`} style={{width:250,background:"#0d1018",borderRight:"1px solid #1e2130",overflowY:"auto",flexShrink:0,maxHeight:"calc(100vh - 57px)",position:"sticky",top:57}}>
          <div style={{padding:"14px 12px 6px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{fontFamily:"'Lato',sans-serif",fontSize:9,color:"#444",letterSpacing:2}}>SEMANAS</div>
            <button onClick={()=>setSidebarOpen(false)} className="menu-toggle"
              style={{background:"transparent",border:"none",color:"#555",cursor:"pointer",fontSize:16,alignItems:"center",justifyContent:"center",width:24,height:24}}>✕</button>
          </div>
          {SEMANAS.map((s,i)=>{
            const c=s.dias.filter((_,j)=>done[`${s.numero}-${j}`]).length;
            const p=Math.round((c/6)*100);
            const active=semanaIdx===i;
            return (
              <button key={i} className="week-btn" onClick={()=>{setSemanaIdx(i);setExpanded(null);setSidebarOpen(false);}}
